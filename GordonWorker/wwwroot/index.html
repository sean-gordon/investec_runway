<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gordon Finance Engine</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 900: '#0c4a6e' }
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        [v-cloak] { display: none; }
        .fade-enter-active, .fade-leave-active { transition: opacity 0.2s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
        .slide-up-enter-active, .slide-up-leave-active { transition: transform 0.3s ease, opacity 0.3s ease; }
        .slide-up-enter-from, .slide-up-leave-to { transform: translateY(20px); opacity: 0; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen overflow-hidden flex flex-col">

    <div id="app" v-cloak class="flex-1 flex flex-col h-full overflow-hidden relative">

        <!-- AUTH OVERLAY -->
        <div v-if="!auth.token" class="fixed inset-0 z-[100] bg-brand-900 flex items-center justify-center p-4">
            <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">
                <div class="bg-brand-600 p-8 text-center text-white">
                    <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-4 backdrop-blur-sm">
                        <span class="text-3xl font-bold">G</span>
                    </div>
                    <h2 class="text-2xl font-bold">Gordon Finance</h2>
                    <p class="text-white/70 text-sm mt-1">Actuarial spending insights.</p>
                </div>
                
                <div class="p-8">
                    <!-- Login Form -->
                    <div v-if="authView === 'login'" class="space-y-4">
                        <div>
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Username</label>
                            <input v-model="loginForm.username" type="text" class="w-full mt-1.5 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-brand-500 transition-all">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Password</label>
                            <input v-model="loginForm.password" type="password" @keyup.enter="login" class="w-full mt-1.5 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-brand-500 transition-all">
                        </div>
                        <button @click="login" :disabled="loading" class="w-full bg-brand-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-brand-200 hover:bg-brand-700 active:scale-95 transition-all">
                            {{ loading ? 'Signing in...' : 'Sign In' }}
                        </button>
                        <p class="text-center text-sm text-slate-500 mt-4">
                            Don't have an account? <a @click="authView = 'register'" class="text-brand-600 font-bold cursor-pointer hover:underline">Register</a>
                        </p>
                    </div>

                    <!-- Register Form -->
                    <div v-else class="space-y-4">
                        <div>
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Desired Username</label>
                            <input v-model="registerForm.username" type="text" class="w-full mt-1.5 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-brand-500 transition-all">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Password</label>
                            <input v-model="registerForm.password" type="password" class="w-full mt-1.5 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-brand-500 transition-all">
                        </div>
                        <button @click="register" :disabled="loading" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-slate-900 active:scale-95 transition-all">
                            {{ loading ? 'Creating Account...' : 'Create Account' }}
                        </button>
                        <p class="text-center text-sm text-slate-500 mt-4">
                            Already a user? <a @click="authView = 'login'" class="text-brand-600 font-bold cursor-pointer hover:underline">Login</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- MAIN APP (Authorized) -->
        <template v-if="auth.token">
            <header class="bg-white border-b border-slate-200 h-16 shrink-0 flex items-center justify-between px-4 lg:px-8 z-20 shadow-sm relative">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-brand-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                        <span class="text-xl font-bold">G</span>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-slate-900 leading-tight">Gordon</h1>
                        <div class="flex items-center gap-1.5">
                            <span class="w-2 h-2 rounded-full" :class="systemStatus.investecOnline ? 'bg-green-500' : 'bg-red-500'"></span>
                            <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-wider">{{ auth.username }}</p>
                        </div>
                    </div>
                </div>
                <button @click="logout" class="text-xs font-bold text-slate-400 hover:text-red-500 transition-colors">LOGOUT</button>
            </header>

            <div class="flex-1 flex overflow-hidden max-w-7xl mx-auto w-full">
                <!-- SIDEBAR -->
                <aside class="hidden md:flex w-64 flex-col border-r border-slate-200 bg-white">
                    <nav class="flex-1 p-4 space-y-1">
                        <button v-for="item in menuItems" @click="activeTab = item.id"
                            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all"
                            :class="activeTab === item.id ? 'bg-brand-50 text-brand-700' : 'text-slate-600 hover:bg-slate-50'">
                            <span>{{ item.icon }}</span> {{ item.name }}
                        </button>
                    </nav>
                </aside>

                <!-- CONTENT -->
                <main class="flex-1 overflow-y-auto p-4 lg:p-8 pb-24 md:pb-8">
                    <!-- DASHBOARD -->
                    <div v-if="activeTab === 'dashboard'" class="space-y-6">
                        <h2 class="text-2xl font-bold">Dashboard</h2>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                                <p class="text-xs font-bold text-slate-400 uppercase">Telegram Hits</p>
                                <p class="text-xl font-bold mt-1">{{ formatTime(systemStatus.lastTelegramHit) }}</p>
                            </div>
                            <!-- ... More cards -->
                        </div>
                    </div>

                    <!-- ADMIN: USERS -->
                    <div v-if="activeTab === 'admin-users' && auth.role === 'Admin'" class="space-y-6">
                        <div class="flex justify-between items-center">
                            <h2 class="text-xl font-bold">User Management</h2>
                            <button @click="openUserModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold text-sm">Add User</button>
                        </div>
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <table class="w-full text-left text-sm">
                                <thead class="bg-slate-50 border-b border-slate-200">
                                    <tr>
                                        <th class="px-6 py-3 font-bold text-slate-700">Username</th>
                                        <th class="px-6 py-3 font-bold text-slate-700">Role</th>
                                        <th class="px-6 py-3 font-bold text-slate-700">System</th>
                                        <th class="px-6 py-3 font-bold text-slate-700 text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100">
                                    <tr v-for="u in users" :key="u.id" class="hover:bg-slate-50">
                                        <td class="px-6 py-3">{{ u.username }}</td>
                                        <td class="px-6 py-3"><span class="px-2 py-1 rounded-full text-xs font-bold" :class="u.role === 'Admin' ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-100 text-slate-600'">{{ u.role }}</span></td>
                                        <td class="px-6 py-3 text-xs text-slate-400">{{ u.isSystem ? 'YES' : '-' }}</td>
                                        <td class="px-6 py-3 text-right space-x-2">
                                            <button @click="openUserModal(u)" class="text-blue-600 font-bold hover:underline">Edit</button>
                                            <button v-if="!u.isSystem" @click="deleteUser(u.id)" class="text-red-600 font-bold hover:underline">Delete</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- USER MODAL -->
                    <div v-if="isUserModalOpen" class="fixed inset-0 z-[150] bg-black/50 flex items-center justify-center p-4">
                        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 space-y-4">
                            <h3 class="text-lg font-bold">{{ userForm.id ? 'Edit User' : 'New User' }}</h3>
                            <input v-if="!userForm.id" v-model="userForm.username" type="text" placeholder="Username" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 outline-none">
                            <input v-model="userForm.password" type="password" :placeholder="userForm.id ? 'New Password (Optional)' : 'Password'" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 outline-none">
                            <select v-model="userForm.role" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 outline-none">
                                <option value="User">User</option>
                                <option value="Admin">Admin</option>
                            </select>
                            <div class="flex gap-2 justify-end pt-2">
                                <button @click="isUserModalOpen = false" class="px-4 py-2 text-slate-500 font-bold">Cancel</button>
                                <button @click="saveUser" class="px-4 py-2 bg-brand-600 text-white rounded-lg font-bold">Save</button>
                            </div>
                        </div>
                    </div>

                    <!-- SETTINGS -->
                    <div v-if="activeTab.startsWith('s-')" class="max-w-3xl space-y-6">
                        <div class="flex justify-between items-center">
                            <h2 class="text-xl font-bold">Configuration</h2>
                            <button @click="saveSettings" class="bg-brand-600 text-white px-6 py-2 rounded-lg font-bold">Save</button>
                        </div>
                        <div class="bg-white rounded-2xl border border-slate-200 p-6 space-y-6">
                            <div>
                                <label class="text-xs font-bold text-slate-500 uppercase">Bot Persona</label>
                                <input v-model="settings.systemPersona" type="text" class="w-full mt-1.5 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 outline-none">
                            </div>
                            <!-- Add more settings fields here -->
                        </div>
                    </div>
                </main>
            </div>
        </template>

        <!-- TOAST -->
        <transition name="slide-up">
            <div v-if="toast.show" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-xl shadow-2xl z-[200]">
                {{ toast.msg }}
            </div>
        </transition>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    loading: false,
                    authView: 'login',
                    auth: { token: localStorage.getItem('token'), username: localStorage.getItem('username'), role: localStorage.getItem('role') || 'User' },
                    loginForm: { username: '', password: '' },
                    registerForm: { username: '', password: '' },
                    activeTab: 'dashboard',
                    users: [],
                    userForm: { id: 0, username: '', password: '', role: 'User' },
                    isUserModalOpen: false,
                    menuItems: [
                        { id: 'dashboard', name: 'Dashboard', icon: '🏠' },
                        { id: 's-identity', name: 'Identity', icon: '👤' },
                        { id: 's-connections', name: 'Connections', icon: '🔗' },
                        { id: 'admin-users', name: 'User Mgmt', icon: '🛡️', adminOnly: true }
                    ],
                    settings: { systemPersona: 'Gordon' },
                    systemStatus: { lastTelegramHit: null },
                    toast: { show: false, msg: '' }
                }
            },
            mounted() {
                if (this.auth.token) {
                    this.loadData();
                    if (this.auth.role === 'Admin') this.loadUsers();
                }
            },
            methods: {
                async api(path, method = 'GET', body = null) {
                    const headers = { 'Authorization': `Bearer ${this.auth.token}` };
                    if (body) headers['Content-Type'] = 'application/json';
                    const res = await fetch(path, { method, headers, body: body ? JSON.stringify(body) : null });
                    if (res.status === 401) this.logout();
                    return res;
                },
                async login() {
                    this.loading = true;
                    try {
                        const res = await fetch('/api/auth/login', {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.loginForm)
                        });
                        if (res.ok) {
                            const data = await res.json();
                            // Parse JWT payload for role (simple base64 decode of part 2)
                            const payload = JSON.parse(atob(data.token.split('.')[1]));
                            const role = payload.role || 'User';
                            
                            this.auth = { token: data.token, username: data.username, role: role };
                            localStorage.setItem('token', data.token);
                            localStorage.setItem('username', data.username);
                            localStorage.setItem('role', role);
                            
                            this.loadData();
                            if (role === 'Admin') this.loadUsers();
                        } else this.showToast("Login Failed");
                    } finally { this.loading = false; }
                },
                async register() {
                    this.loading = true;
                    try {
                        const res = await fetch('/api/auth/register', {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.registerForm)
                        });
                        if (res.ok) { this.showToast("Registered! Please login."); this.authView = 'login'; }
                        else this.showToast("Registration Failed");
                    } finally { this.loading = false; }
                },
                logout() {
                    this.auth = { token: null, username: null, role: null };
                    localStorage.clear();
                },
                async loadData() {
                    const resS = await this.api('/api/settings');
                    if (resS.ok) this.settings = await resS.json();
                    const resSt = await this.api('/api/settings/status');
                    if (resSt.ok) this.systemStatus = await resSt.json();
                },
                async loadUsers() {
                    const res = await this.api('/api/users');
                    if (res.ok) this.users = await res.json();
                },
                openUserModal(u = null) {
                    this.userForm = u ? { ...u, password: '' } : { id: 0, username: '', password: '', role: 'User' };
                    this.isUserModalOpen = true;
                },
                async saveUser() {
                    const method = this.userForm.id ? 'PUT' : 'POST';
                    const url = this.userForm.id ? `/api/users/${this.userForm.id}` : '/api/users';
                    const res = await this.api(url, method, this.userForm);
                    if (res.ok) { this.showToast("User Saved"); this.isUserModalOpen = false; this.loadUsers(); }
                    else this.showToast("Save Failed");
                },
                async deleteUser(id) {
                    if (!confirm("Are you sure?")) return;
                    const res = await this.api(`/api/users/${id}`, 'DELETE');
                    if (res.ok) { this.showToast("User Deleted"); this.loadUsers(); }
                },
                async saveSettings() {
                    const res = await this.api('/api/settings', 'PUT', this.settings);
                    if (res.ok) this.showToast("Settings Saved");
                },
                showToast(msg) {
                    this.toast = { show: true, msg };
                    setTimeout(() => this.toast.show = false, 3000);
                },
                formatTime(d) { return d ? new Date(d).toLocaleTimeString() : 'Never'; }
            }
        }).mount('#app');
    </script>
</body>
</html>
