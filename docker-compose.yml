services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      - POSTGRES_PASSWORD=password
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - timescaledb_data:/var/lib/postgresql/data
    networks:
      - finance-net

  gordon-worker:
    build:
      context: ./GordonWorker
      dockerfile: Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=timescaledb;Database=postgres;Username=postgres;Password=password
      - INVESTEC_CLIENT_ID=${INVESTEC_CLIENT_ID}
      - INVESTEC_SECRET=${INVESTEC_SECRET}
      - INVESTEC_API_KEY=${INVESTEC_API_KEY}
    networks:
      - finance-net
    depends_on:
      - timescaledb
    ports:
      - "52944:8080"

networks:
  finance-net:

volumes:
  timescaledb_data:
