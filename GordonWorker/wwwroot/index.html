<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gordon Finance Engine</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js?v=3.5"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], outfit: ['Outfit', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#1A1400', 100: '#251B00', 200: '#3A2C00', 500: '#D4A931', 600: '#D4A931', 700: '#A87E20', 900: '#000000' }
                    }
                }
            }
        }
    </script>
    <style>
        /* ── GORDON × LAMBORGHINI DARK THEME ── */
        :root {
            --gold: #D4A931; --gold-lt: #E8C55A; --gold-dk: #A87E20;
            --gold-glow: rgba(212,169,49,0.10);
            --s0: #000000; --s1: #080808; --s2: #0E0E0E;
            --s3: #141414; --s4: #1A1A1A; --s5: #212121; --s6: #2A2A2A;
            --b1: #181818; --b2: #202020; --b3: #2C2C2C;
        }
        body { -webkit-tap-highlight-color: transparent; font-feature-settings: 'tnum' on; }
        [v-cloak] { display: none; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: var(--s1); }
        ::-webkit-scrollbar-thumb { background: var(--s5); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold-dk); }

        /* ── Surfaces ── */
        .bg-white           { background-color: var(--s3) !important; }
        .bg-slate-50        { background-color: var(--s1) !important; }
        .bg-slate-100       { background-color: var(--s2) !important; }
        .bg-slate-200       { background-color: var(--s4) !important; }
        .bg-slate-700,
        .bg-slate-800,
        .bg-slate-900       { background-color: var(--s0) !important; }

        .hover\:bg-white:hover      { background-color: var(--s4) !important; }
        .hover\:bg-slate-50:hover   { background-color: var(--s3) !important; }

        /* ── Text ── */
        .text-slate-900 { color: #FFFFFF !important; }
        .text-slate-800 { color: #E5E5E5 !important; }
        .text-slate-700 { color: #CCCCCC !important; }
        .text-slate-600 { color: #A3A3A3 !important; }
        .text-slate-500 { color: #737373 !important; }
        .text-slate-400 { color: #525252 !important; }
        .text-slate-300 { color: #404040 !important; }

        /* HIGH CONTRAST OVERRIDES FOR DARK THEME */
        .text-slate-300 { color: #A3A3A3 !important; } /* Improved from #2E2C2A */
        .text-slate-400 { color: #737373 !important; } /* Improved from #3C3A38 */
    </style>
</head>

<body class="h-screen overflow-hidden flex flex-col" style="background:#000000;color:#F0EBE0">

    <div id="app" v-cloak class="flex-1 flex flex-col h-full overflow-hidden relative">

        <!-- LANDING PAGE / AUTH OVERLAY -->
        <div v-if="!auth.token" class="fixed inset-0 z-[100] bg-black overflow-y-auto selection:bg-gold selection:text-black">
            <div class="min-h-screen flex flex-col items-center justify-center p-6 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-[#1a1a1a] via-black to-black">
                
                <!-- Hero Section -->
                <div class="text-center mb-12 max-w-2xl">
                    <div class="inline-block p-4 rounded-3xl bg-gradient-to-br from-gold/20 to-transparent border border-gold/30 mb-8 shadow-[0_0_50px_rgba(212,169,49,0.1)]">
                        <svg class="w-16 h-16 text-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </div>
                    <h1 class="text-6xl md:text-8xl font-black text-white tracking-tighter mb-6 uppercase italic leading-none">
                        GORDON <span class="text-gold">RUNWAY</span>
                    </h1>
                    <p class="text-xl text-slate-400 font-medium tracking-tight max-w-lg mx-auto leading-relaxed">
                        Experience the pinnacle of financial engineering. <br/>
                        High-performance actuarial intelligence for the elite.
                    </p>
                </div>

                <!-- Auth Card -->
                <div class="w-full max-w-md">
                    <div class="bg-[#0E0E0E] rounded-[2.5rem] border border-white/10 shadow-2xl overflow-hidden backdrop-blur-3xl">
                        <div class="p-10">
                            <div class="flex gap-2 mb-10 bg-black/60 p-1.5 rounded-2xl border border-white/5">
                                <button @click="authView = 'login'" :class="authView === 'login' ? 'bg-gold text-black font-bold shadow-lg' : 'text-slate-500 hover:text-slate-300'" class="flex-1 py-4 rounded-xl transition-all duration-500 uppercase text-[10px] tracking-[0.2em]">Login</button>
                                <button @click="authView = 'register'" :class="authView === 'register' ? 'bg-gold text-black font-bold shadow-lg' : 'text-slate-500 hover:text-slate-300'" class="flex-1 py-4 rounded-xl transition-all duration-500 uppercase text-[10px] tracking-[0.2em]">Register</button>
                            </div>

                            <div v-if="authView === 'login'" class="space-y-6">
                                <div>
                                    <label class="block text-[10px] uppercase tracking-[0.3em] text-gold font-black mb-3 ml-1">Identity</label>
                                    <input v-model="loginForm.username" type="text" class="w-full bg-black border border-white/10 rounded-2xl px-6 py-5 text-white focus:outline-none focus:border-gold transition-all duration-500 placeholder:text-slate-800" placeholder="USERNAME">
                                </div>
                                <div>
                                    <label class="block text-[10px] uppercase tracking-[0.3em] text-gold font-black mb-3 ml-1">Security Key</label>
                                    <input v-model="loginForm.password" type="password" class="w-full bg-black border border-white/10 rounded-2xl px-6 py-5 text-white focus:outline-none focus:border-gold transition-all duration-500 placeholder:text-slate-800" placeholder="••••••••" @keyup.enter="login">
                                </div>

                                <button @click="login" :disabled="loading" class="w-full bg-gold hover:bg-gold-lt disabled:opacity-50 text-black font-black py-6 rounded-2xl transition-all duration-700 transform hover:scale-[1.02] active:scale-[0.98] shadow-[0_0_40px_rgba(212,169,49,0.25)] uppercase tracking-[0.2em] text-xs flex items-center justify-center gap-3 mt-4">
                                    <span v-if="loading" class="animate-spin rounded-full h-4 w-4 border-2 border-black/20 border-t-black"></span>
                                    Initiate Sequence
                                </button>
                            </div>

                            <div v-else class="space-y-6">
                                <div>
                                    <label class="block text-[10px] uppercase tracking-[0.3em] text-gold font-black mb-3 ml-1">Choose Identity</label>
                                    <input v-model="registerForm.username" type="text" class="w-full bg-black border border-white/10 rounded-2xl px-6 py-5 text-white focus:outline-none focus:border-gold transition-all duration-500 placeholder:text-slate-800" placeholder="NEW USERNAME">
                                </div>
                                <div>
                                    <label class="block text-[10px] uppercase tracking-[0.3em] text-gold font-black mb-3 ml-1">Establish Key</label>
                                    <input v-model="registerForm.password" type="password" class="w-full bg-black border border-white/10 rounded-2xl px-6 py-5 text-white focus:outline-none focus:border-gold transition-all duration-500 placeholder:text-slate-800" placeholder="••••••••" @keyup.enter="register">
                                </div>

                                <button @click="register" :disabled="loading" class="w-full bg-white hover:bg-slate-200 disabled:opacity-50 text-black font-black py-6 rounded-2xl transition-all duration-700 transform hover:scale-[1.02] active:scale-[0.98] shadow-xl uppercase tracking-[0.2em] text-xs flex items-center justify-center gap-3 mt-4">
                                    <span v-if="loading" class="animate-spin rounded-full h-4 w-4 border-2 border-black/20 border-t-black"></span>
                                    Create Account
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-16 grid grid-cols-3 gap-12 text-center">
                        <div class="group">
                            <div class="text-gold font-black text-2xl mb-2 italic tracking-tighter group-hover:scale-110 transition-transform">0.4s</div>
                            <div class="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold">Latency</div>
                        </div>
                        <div class="group">
                            <div class="text-gold font-black text-2xl mb-2 italic tracking-tighter group-hover:scale-110 transition-transform">AES-256</div>
                            <div class="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold">Encryption</div>
                        </div>
                        <div class="group">
                            <div class="text-gold font-black text-2xl mb-2 italic tracking-tighter group-hover:scale-110 transition-transform">Actuarial</div>
                            <div class="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold">Engine</div>
                        </div>
                    </div>
                </div>

                <div class="mt-24 text-slate-700 text-[10px] uppercase tracking-[0.5em] font-black opacity-50">
                    © 2026 GORDON FINANCE ENGINE <span class="mx-2">•</span> EXCLUSIVE ACCESS
                </div>
            </div>
        </div>

        <!-- MAIN APP -->
        <template v-if="auth.token">
            <header
                class="bg-white border-b border-slate-200 h-16 shrink-0 flex items-center justify-between px-4 lg:px-8 z-20 shadow-sm relative">
                <div class="flex items-center gap-3">
                    <div
                        class="w-10 h-10 bg-brand-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                        <span class="text-xl font-bold">G</span>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-slate-900 leading-tight">Gordon</h1>
                        <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-wider">{{ auth.username }}
                            <span v-if="auth.role === 'Admin'"
                                class="bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded-full ml-1">ADMIN</span>
                        </p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="hidden sm:flex items-center gap-1.5 bg-green-50 px-2.5 py-1 rounded-full border border-green-100 shadow-sm"
                        title="Security Hardened (v2.5.7+)">
                        <svg class="w-3 h-3 text-green-600" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd"
                                d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zM10 5.234A9.969 9.969 0 0115.833 7.7a9.97 9.97 0 011.001 6.3 9.97 9.97 0 01-6.834 5.766A9.97 9.97 0 013.166 14a9.97 9.97 0 011.001-6.3A9.969 9.969 0 0110 5.234zM10 11.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"
                                clip-rule="evenodd" />
                        </svg>
                        <span class="text-[10px] font-bold text-green-700 uppercase tracking-tight">Secure Mode</span>
                    </div>
                    <button @click="logout"
                        class="text-xs font-bold text-slate-400 hover:text-red-500 transition-colors">LOGOUT</button>
                    <!-- Mobile nav is handled by the bottom navbar -->
                </div>
            </header>

            <div class="flex-1 flex overflow-hidden max-w-7xl mx-auto w-full">
                <!-- SIDEBAR -->
                <aside class="hidden md:flex w-64 flex-col border-r border-slate-200 bg-white">
                    <nav class="flex-1 p-4 space-y-1">
                        <button v-for="item in menuItems" :key="item.id" @click="activeTab = item.id"
                            v-show="!item.adminOnly || auth.role === 'Admin'"
                            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all"
                            :class="activeTab === item.id ? 'bg-brand-50 text-brand-700' : 'text-slate-600 hover:bg-slate-50'">
                            <span class="w-7 h-7 rounded-md flex items-center justify-center text-[10px] font-black shrink-0 transition-colors"
                                :class="activeTab === item.id ? 'bg-brand-600 text-black' : 'bg-slate-100 text-slate-500'">{{ item.icon }}</span> {{ item.name }}
                        </button>
                        <button @click="activeTab = 's-rawdata'"
                            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all"
                            :class="activeTab === 's-rawdata' ? 'bg-brand-50 text-brand-700' : 'text-slate-600 hover:bg-slate-50'">
                            <span>raw</span> Raw Data
                        </button>
                    </nav>
                    <div class="p-4 border-t border-slate-100 bg-slate-50/50 space-y-2">
                        <button @click="sendReportNow" :disabled="sendingReport"
                            class="w-full flex items-center justify-center gap-2 py-2.5 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-700 hover:border-brand-300 hover:text-brand-600 shadow-sm transition-all active:scale-95">
                            {{ sendingReport ? 'Processing...' : 'Run Report' }}
                        </button>
                        <a href="/pricing.html" target="_blank"
                            class="w-full flex items-center justify-center gap-2 py-2.5 bg-gradient-to-r from-brand-600 to-indigo-600 text-white rounded-lg text-xs font-bold shadow-sm hover:opacity-90 transition-all active:scale-95">
                            View Plans
                        </a>
                    </div>
                </aside>

                <!-- CONTENT -->
                <main class="flex-1 overflow-y-auto p-4 lg:p-8 pb-24 md:pb-8 bg-slate-50">

                    <!-- DASHBOARD -->
                    <div v-if="activeTab === 'dashboard'" class="space-y-6">
                        <div class="flex flex-wrap gap-2 justify-between items-center">
                            <h2 class="text-2xl font-bold">Dashboard</h2>
                            <div class="flex flex-wrap gap-2">
                                <button @click="categorizeExisting" :disabled="categorizing"
                                    class="text-xs bg-white border border-slate-200 px-3 py-1.5 rounded-lg font-bold hover:bg-slate-50 disabled:opacity-50">
                                    {{ categorizing ? 'Processing...' : 'Categorize' }}
                                </button>
                                <button @click="forceRepull"
                                    class="text-xs bg-white border border-slate-200 px-3 py-1.5 rounded-lg font-bold hover:bg-slate-50">Sync</button>
                                <!-- Mobile-friendly Run Report. The sidebar version is hidden on
                                     small screens, so without this entry mobile users had no way
                                     to trigger the weekly report on demand. -->
                                <button @click="sendReportNow" :disabled="sendingReport"
                                    class="text-xs bg-white border border-slate-200 px-3 py-1.5 rounded-lg font-bold hover:bg-slate-50 disabled:opacity-50">
                                    {{ sendingReport ? 'Processing...' : 'Run Report' }}
                                </button>
                            </div>
                        </div>
                        <!-- KPI strip: 3 cols × 2 rows gives each card enough width to hold a
                             long currency string without wrapping. The previous 6-across grid
                             squeezed Current Balance until "R 1 234 567,89" broke onto two lines. -->
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                            <!-- Current Balance -->
                            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm relative group">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Current Balance
                                </p>
                                <div class="mt-1">
                                    <span class="text-xl font-black tracking-tight whitespace-nowrap"
                                        :class="parseFloat(healthStats?.CurrentBalance) < 0 ? 'text-red-500' : 'text-slate-900'">
                                        {{ formatCurrency(parseFloat(healthStats?.CurrentBalance || 0)) }}
                                    </span>
                                </div>
                                <p class="text-[10px] text-slate-400 mt-1">Live from Investec</p>
                            </div>

                            <!-- Investec -->
                            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Investec API
                                </p>
                                <div class="mt-1 flex items-center justify-between">
                                    <span class="text-lg font-bold"
                                        :class="systemStatus.investecOnline ? 'text-green-600' : 'text-red-600'">
                                        {{ systemStatus.investecOnline ? 'Online' : 'Offline' }}
                                    </span>
                                    <div class="w-8 h-8 rounded-lg flex items-center justify-center text-[10px] font-black"
                                        :class="systemStatus.investecOnline ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'">
                                        IN</div>
                                </div>
                                <p class="text-[10px] text-slate-400 mt-1">Last seen: {{
                                    formatTime(systemStatus.lastInvestecCheck) }}</p>
                            </div>

                            <!-- Database -->
                            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Database</p>
                                <div class="mt-1 flex items-center justify-between">
                                    <span class="text-lg font-bold"
                                        :class="systemStatus.databaseOnline ? 'text-green-600' : 'text-red-600'">
                                        {{ systemStatus.databaseOnline ? 'Active' : 'Down' }}
                                    </span>
                                    <div class="w-8 h-8 rounded-lg flex items-center justify-center text-[10px] font-black"
                                        :class="systemStatus.databaseOnline ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'">
                                        DB</div>
                                </div>
                                <p class="text-[10px] text-slate-400 mt-1">TimescaleDB Hypertable</p>
                            </div>

                            <!-- AI Primary -->
                            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm relative group">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Primary AI</p>
                                <div class="mt-1 flex items-center justify-between">
                                    <span class="text-lg font-bold"
                                        :class="systemStatus.aiPrimaryOnline ? 'text-green-600' : (systemStatus.aiPrimaryError?.includes('Rate Limited') ? 'text-amber-500' : 'text-red-600')">
                                        {{ systemStatus.aiPrimaryOnline ? 'Ready' :
                                        (systemStatus.aiPrimaryError?.includes('Rate Limited') ? 'Throttled' :
                                        'Offline') }}
                                    </span>
                                    <div class="w-8 h-8 rounded-lg flex items-center justify-center text-[10px] font-black"
                                        :class="systemStatus.aiPrimaryOnline ? 'bg-green-50 text-green-600' : (systemStatus.aiPrimaryError?.includes('Rate Limited') ? 'bg-amber-50 text-amber-500' : 'bg-red-50 text-red-600')">
                                        AI</div>
                                </div>
                                <p v-if="!systemStatus.aiPrimaryOnline && systemStatus.aiPrimaryError"
                                    class="text-[9px] text-red-400 mt-1 italic truncate"
                                    :title="systemStatus.aiPrimaryError">{{ systemStatus.aiPrimaryError }}</p>
                                <p v-else class="text-[10px] text-slate-400 mt-1 truncate">{{ 
                                    settings.aiProvider === 'Gemini' ? settings.geminiModelName :
                                    settings.aiProvider === 'OpenAI' ? settings.openAiModelName :
                                    settings.aiProvider === 'Anthropic' ? settings.anthropicModelName :
                                    settings.aiProvider === 'Claude CLI' ? settings.claudeCliModelName :
                                    settings.ollamaModelName }}</p>
                            </div>

                            <!-- AI Fallback -->
                            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm relative group">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Backup AI</p>
                                <div class="mt-1 flex items-center justify-between">
                                    <span class="text-lg font-bold"
                                        :class="systemStatus.aiFallbackOnline ? 'text-green-600' : (systemStatus.aiFallbackError?.includes('Rate Limited') ? 'text-amber-500' : 'text-amber-600')">
                                        {{ settings.enableAiFallback ? (systemStatus.aiFallbackOnline ? 'Standby' :
                                        (systemStatus.aiFallbackError?.includes('Rate Limited') ? 'Throttled' :
                                        'Offline')) : 'Disabled' }}
                                    </span>
                                    <div class="w-8 h-8 rounded-lg flex items-center justify-center text-[10px] font-black"
                                        :class="systemStatus.aiFallbackOnline ? 'bg-green-50 text-green-600' : (systemStatus.aiFallbackError?.includes('Rate Limited') ? 'bg-amber-50 text-amber-500' : 'bg-amber-50 text-amber-600')">
                                        FB</div>
                                </div>
                                <p v-if="settings.enableAiFallback && !systemStatus.aiFallbackOnline && systemStatus.aiFallbackError"
                                    class="text-[9px] text-amber-500 mt-1 italic truncate"
                                    :title="systemStatus.aiFallbackError">{{ systemStatus.aiFallbackError }}</p>
                                <p v-else class="text-[10px] text-slate-400 mt-1 truncate">{{
                                    settings.fallbackAiProvider === 'Gemini' ? settings.fallbackGeminiModelName :
                                    settings.fallbackAiProvider === 'OpenAI' ? settings.fallbackOpenAiModelName :
                                    settings.fallbackAiProvider === 'Anthropic' ? settings.fallbackAnthropicModelName :
                                    settings.fallbackAiProvider === 'Claude CLI' ? settings.fallbackClaudeCliModelName :
                                    settings.fallbackOllamaModelName }}</p>
                            </div>

                            <!-- YoY Seasonality -->
                            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">YoY Seasonality
                                </p>
                                <div v-if="healthStats && healthStats.SpendSameMonthLastYear > 0"
                                    class="mt-1 flex items-center justify-between">
                                    <span class="text-lg font-bold"
                                        :class="healthStats.YoYChangePercentage > 5 ? 'text-red-600' : (healthStats.YoYChangePercentage < -5 ? 'text-green-600' : 'text-slate-600')">
                                        {{ healthStats.YoYChangePercentage > 0 ? '+' : '' }}{{
                                        healthStats.YoYChangePercentage }}%
                                    </span>
                                    <div
                                        class="w-8 h-8 rounded-lg flex items-center justify-center text-[10px] font-black bg-indigo-50 text-indigo-600">
                                        YY</div>
                                </div>
                                <div v-else class="mt-1 flex items-center justify-between">
                                    <span class="text-lg font-bold text-slate-300 italic">No Data</span>
                                    <div
                                        class="w-8 h-8 rounded-lg flex items-center justify-center text-[10px] font-black bg-slate-50 text-slate-300">
                                        YY</div>
                                </div>
                                <p class="text-[10px] text-slate-400 mt-1">Vs. Same Month 2025</p>
                            </div>
                        </div>

                        <!-- Charts -->
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                                <div class="flex justify-between items-center mb-4">
                                    <h3 class="font-bold text-slate-800 text-sm">Spending by Category</h3>
                                    <select class="text-[10px] bg-slate-50 border border-slate-200 rounded px-1 py-0.5">
                                        <option>Last 30 Days</option>
                                    </select>
                                </div>
                                <div class="h-64">
                                    <canvas id="categoryChart"></canvas>
                                </div>
                            </div>
                            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                                <div class="flex justify-between items-center mb-4">
                                    <h3 class="font-bold text-slate-800 text-sm">Balance History</h3>
                                    <button @click="loadCharts"

                    class="flex flex-col items-center gap-1 p-2 flex-1 rounded-xl transition-all"
                    :class="activeTab.startsWith('s-') ? 'text-brand-600 bg-brand-50' : 'text-slate-400'">
                    <span class="w-6 h-6 rounded-md flex items-center justify-center text-[9px] font-black bg-current/10">ST</span>
                    <span class="text-[9px] font-bold uppercase tracking-tight">Setup</span>
                </button>
            </div>
        </template>

        <!-- TOAST NOTIFICATION -->
        <div v-if="toast.show"
            class="fixed top-4 right-4 z-[200] bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3"
            role="alert" aria-live="polite">
            <span class="font-bold text-sm">{{ toast.msg }}</span>
        </div>

        <!-- USER MODAL -->
        <div v-if="isUserModalOpen" class="fixed inset-0 z-[150] bg-black/50 flex items-center justify-center p-4" role="dialog" aria-modal="true" aria-label="User form">
            <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 space-y-4">
                <h3 class="text-lg font-bold">{{ userForm.id ? 'Edit User' : 'New User' }}</h3>
                <input v-if="!userForm.id" v-model="userForm.username" type="text" placeholder="Username"
                    class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 outline-none">
                <input v-model="userForm.password" type="password"
                    :placeholder="userForm.id ? 'New Password (Optional)' : 'Password'"
                    class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 outline-none">
                <select v-model="userForm.role"
                    class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 outline-none">
                    <option value="User">User</option>
                    <option value="Admin">Admin</option>
                </select>
                <div class="flex gap-2 justify-end pt-2">
                    <button @click="isUserModalOpen = false" class="px-4 py-2 text-slate-500 font-bold">Cancel</button>
                    <button @click="saveUser"
                        class="px-4 py-2 bg-brand-600 text-white rounded-lg font-bold">Save</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const { createApp } = Vue;

        const HelpTooltip = {
            props: ['text'],
            template: `
                <div class="relative inline-flex items-center ml-1 group">
                    <span class="cursor-help text-slate-400 hover:text-brand-600 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                    </span>
                    <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 hidden group-hover:block w-48 bg-slate-800 text-white text-[10px] p-2 rounded shadow-lg z-50 pointer-events-none text-center leading-tight opacity-0 group-hover:opacity-100 transition-opacity">
                        {{ text }}
                        <div class="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-slate-800"></div>
                    </div>
                </div>
            `
        };

        createApp({
            components: { HelpTooltip },
            data() {
                return {
                    loading: false,
                    sendingReport: false,
                    categorizing: false,
                    categorizeResult: "",
                    authView: 'login',
                    auth: { token: null, username: localStorage.getItem('username'), role: localStorage.getItem('role') || 'User' },
                    loginForm: { username: '', password: '' },
                    registerForm: { username: '', password: '' },
                    activeTab: 'dashboard',
                    rawDataOffset: 0,
                    rawDataLimit: 100,
                    users: [],
                    userForm: { id: 0, username: '', password: '', role: 'User' },
                    isUserModalOpen: false,
                    menuItems: [
                        { id: 'dashboard', name: 'Dashboard', icon: 'DB' },
                        { id: 's-simulation', name: 'What-If Analysis', icon: 'WI' },
                        { id: 's-identity', name: 'Identity', icon: 'ID' },
                        { id: 's-connections', name: 'Connections', icon: 'CN' },
                        { id: 's-ai', name: 'Brain', icon: 'AI' },
                        { id: 's-math', name: 'Math & Logic', icon: 'ML' },
                        { id: 's-delivery', name: 'Email & Schedule', icon: 'ES' },
                        { id: 'logs', name: 'System Logs', icon: 'LG' },
                        { id: 'admin-users', name: 'User Mgmt', icon: 'UM', adminOnly: true }
                    ],
                    settings: {
                        userName: 'User', currencyCulture: 'en-ZA', investecBaseUrl: 'https://openapi.investec.com/',
                        aiProvider: 'Ollama', ollamaBaseUrl: '', systemPersona: 'Gordon',
                        smtpPort: 587, reportDayOfWeek: 'Monday', reportHour: 9,
                        analysisWindowDays: 90, actuarialAlpha: 0.15, unexpectedPaymentThreshold: 3000, incomeAlertThreshold: 5000,
                        historyDaysBack: 180, syncBufferDays: 0.05,
                        minCycleDays: 20, maxCycleDays: 45, defaultCycleDays: 30,
                        pulseBaselineThreshold: 0.1, hybridBaselineThreshold: 0.1, varConfidenceInterval: 1.645,
                        enableAiFallback: true, fallbackAiProvider: 'Gemini', fallbackOllamaBaseUrl: 'http://host.docker.internal:11434',
                        fallbackOllamaModelName: 'llama3', fallbackGeminiApiKey: '', aiTimeoutSeconds: 90, aiRetryAttempts: 2,
                        enableThinkingModel: false, thinkingAiProvider: 'Ollama', thinkingOllamaBaseUrl: 'http://host.docker.internal:11434',
                        thinkingOllamaModelName: 'deepseek-r1', thinkingGeminiModelName: 'gemini-2.0-flash-thinking-exp', thinkingGeminiApiKey: ''
                    },
                    availableModels: [],
                    availableFallbackModels: [],
                    availableThinkingModels: [],
                    days: ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'],
                    systemStatus: {
                        investecOnline: false,
                        databaseOnline: true,
                        aiPrimaryOnline: false,
                        aiFallbackOnline: false,
                        lastTelegramHit: null,
                        lastTelegramError: '',
                        lastCheck: null,
                        lastAiCheck: null,
                        lastInvestecCheck: null
                    },
                    healthStats: null,
                    toast: { show: false, msg: '' },
                    recentTransactions: [],
                    logs: [],
                    logFilter: 'ALL',
                    logSearch: '',
                    logPolling: null,
                    logFileLevel: 'info',
                    logFileDate: '',
                    logFileDates: {},
                    logFileContent: '',
                    logFileLoading: false,
                    rawTransactions: [],
                    categoryChart: null,
                    balanceChart: null,
                    simulationAdjustments: [],
                    newAdjustment: { type: 'MonthlyExpense', amount: 0, description: '' },
                    simulationResult: null,
                    simLoading: false
                }
            },
            computed: {
                filteredLogs() {
                    return this.logs.filter(l => {
                        const matchLevel = this.logFilter === 'ALL' || l.level.toUpperCase() === this.logFilter;
                        const matchSearch = !this.logSearch ||
                            l.message.toLowerCase().includes(this.logSearch.toLowerCase()) ||
                            l.category.toLowerCase().includes(this.logSearch.toLowerCase());
                        return matchLevel && matchSearch;
                    });
                }
            },
            watch: {
                activeTab(newTab) {
                    if (newTab === 'logs') {
                        this.fetchLogs();
                        this.startLogPolling();
                        this.loadLogFiles();
                    } else {
                        this.stopLogPolling();
                    }
                    if (newTab === 's-rawdata') {
                        this.loadRawData();
                    }
                    if (newTab === 'admin-users') {
                        this.loadUsers();
                    }
                }
            },
            async mounted() {
                // Attempt silent refresh first. If successful, it populates this.auth.token
                // from the httpOnly refresh cookie.
                const refreshed = await this.tryRefreshToken();
                if (refreshed || this.auth.token) {
                    this.loadData();
                    if (this.auth.role === 'Admin') this.loadUsers();
                }
            },
            methods: {
                async api(path, method = 'GET', body = null) {
                    // Access tokens are short-lived (15 min). On a 401 we attempt one silent
                    // refresh via the httpOnly refresh cookie, then retry the original request
                    // exactly once. Concurrent 401s collapse onto a single shared refresh
                    // promise so a burst of requests doesn't trigger N rotations.
                    const doFetch = () => {
                        const headers = { 'Authorization': `Bearer ${this.auth.token}` };
                        if (body) headers['Content-Type'] = 'application/json';
                        return fetch(path, {
                            method,
                            headers,
                            body: body ? JSON.stringify(body) : null,
                            credentials: 'include'
                        });
                    };

                    let res = await doFetch();
                    if (res.status === 401 && this.auth.token && !path.startsWith('/api/auth/')) {
                        const refreshed = await this.tryRefreshToken();
                        if (refreshed) {
                            res = await doFetch();
                        } else {
                            this.logout();
                        }
                    }
                    return res;
                },
                async tryRefreshToken() {
                    // Coalesce: if a refresh is already in flight, await the same promise so we
                    // never rotate the refresh token twice in parallel (which would invalidate
                    // one of the rotations).
                    if (this._refreshPromise) return this._refreshPromise;
                    this._refreshPromise = (async () => {
                        try {
                            const res = await fetch('/api/auth/refresh', {
                                method: 'POST',
                                credentials: 'include'
                            });
                            if (!res.ok) return false;
                            const data = await res.json();
                            this.auth.token = data.token;
                            // Decrypt payload to get role
                            const payload = JSON.parse(atob(data.token.split('.')[1]));
                            this.auth.role = payload.role || 'User';
                            this.auth.username = data.username;
                            localStorage.setItem('username', data.username);
                            localStorage.setItem('role', this.auth.role);
                            return true;
                        } catch { return false; }
                        finally { this._refreshPromise = null; }
                    })();
                    return this._refreshPromise;
                },
                async login() {
                    if (!this.loginForm.username || !this.loginForm.password) {
                        this.showToast("Username and password are required.");
                        return;
                    }
                    this.loading = true;
                    try {
                        const res = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.loginForm),
                            credentials: 'include'
                        });
                        if (res.ok) {
                            const data = await res.json();
                            const payload = JSON.parse(atob(data.token.split('.')[1]));
                            const role = payload.role || 'User';

                            this.auth = { token: data.token, username: data.username, role: role };
                            localStorage.setItem('username', data.username);
                            localStorage.setItem('role', role);

                            this.loadData();
                            if (role === 'Admin') this.loadUsers();
                        } else this.showToast("Login Failed");
                    } catch { this.showToast("Network Error"); }
                    finally { this.loading = false; }
                },
                async register() {
                    if (!this.registerForm.username || !this.registerForm.password) {
                        this.showToast("Username and password are required.");
                        return;
                    }
                    this.loading = true;
                    try {
                        const res = await fetch('/api/auth/register', {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.registerForm),
                            credentials: 'include'
                        });
                        if (res.ok) { this.showToast("Registered! Please login."); this.authView = 'login'; }
                        else this.showToast("Registration Failed");
                    } finally { this.loading = false; }
                },
                async logout() {
                    // Best-effort revoke server-side; clear local state regardless so a network
                    // failure can't trap the user logged in.
                    try {
                        await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
                    } catch { /* ignore */ }
                    this.stopLogPolling();
                    if (this.categoryChart) { this.categoryChart.destroy(); this.categoryChart = null; }
                    if (this.balanceChart) { this.balanceChart.destroy(); this.balanceChart = null; }
                    this.auth = { token: null, username: null, role: null };
                    localStorage.removeItem('username');
                    localStorage.removeItem('role');
                },
                async loadData() {
                    // Fire the four independent cold-load requests in parallel instead of
                    // staircasing them. On a fresh login this cuts dashboard time-to-render
                    // from ~4× round-trip to ~1× round-trip.
                    const [resS, resSt, resStats, resTx] = await Promise.all([
                        this.api('/api/settings'),
                        this.api('/api/settings/status'),
                        this.api('/api/settings/stats'),
                        this.api('/api/settings/recent-transactions'),
                    ]);

                    if (resS.ok) {
                        this.settings = await resS.json();
                        // Pre-fill thinking prompt textarea with default if user has nothing saved
                        if (!this.settings.thinkingModelInstructions) {
                            const defRes = await this.api('/api/settings/thinking-prompt-default');
                            if (defRes.ok) this.settings.thinkingModelInstructions = await defRes.text();
                        }
                        // Fire-and-forget — model lists never need to block the dashboard render.
                        // Swallow rejections so they don't surface as unhandled promise errors.
                        this.loadModels(false).catch(() => {});
                        this.loadModels(true).catch(() => {});
                        this.loadModels(false, true).catch(() => {});
                        this.$nextTick(() => {
                            document.title = `Gordon | ${this.settings.userName || this.auth.username}`;
                        });
                    }
                    if (resSt.ok) this.systemStatus = await resSt.json();
                    if (resStats.ok) this.healthStats = await resStats.json();
                    if (resTx.ok) this.recentTransactions = await resTx.json();

                    if (this.activeTab === 'dashboard') {
                        this.loadCharts();
                    }
                },
                async loadRawData() {
                    try {
                        const res = await this.api(`/api/transactions?limit=${this.rawDataLimit}&offset=${this.rawDataOffset}`);
                        if (res.ok) {
                            this.rawTransactions = await res.json();
                        } else {
                            console.error("Failed to load raw transactions", res.statusText);
                            this.rawTransactions = [];
                        }
                    } catch (e) {
                        console.error("Failed to load raw transactions", e);
                        this.rawTransactions = [];
                    }
                },
                nextPage() {
                    this.rawDataOffset += this.rawDataLimit;
                    this.loadRawData();
                },
                prevPage() {
                    this.rawDataOffset = Math.max(0, this.rawDataOffset - this.rawDataLimit);
                    this.loadRawData();
                },
                async loadUsers() {
                    const res = await this.api('/api/users');
                    if (res.ok) this.users = await res.json();
                },
                async loadModels(useFallback = false, useThinking = false) {
                    const res = await this.api(`/api/settings/models?useFallback=${useFallback}&useThinking=${useThinking}`, 'POST', this.settings);
                    if (res.ok) {
                        if (useThinking) this.availableThinkingModels = await res.json();
                        else if (useFallback) this.availableFallbackModels = await res.json();
                        else this.availableModels = await res.json();
                    }
                }, openUserModal(u = null) {
                    this.userForm = u ? { ...u, password: '' } : { id: 0, username: '', password: '', role: 'User' };
                    this.isUserModalOpen = true;
                },
                async saveUser() {
                    const method = this.userForm.id ? 'PUT' : 'POST';
                    const url = this.userForm.id ? `/api/users/${this.userForm.id}` : '/api/users';
                    const res = await this.api(url, method, this.userForm);
                    if (res.ok) { this.showToast("User Saved"); this.isUserModalOpen = false; this.loadUsers(); }
                    else this.showToast("Save Failed");
                },
                async loginClaudeCli() {
                    this.showToast("Initializing Claude CLI Login...");
                    try {
                        const res = await this.api('/api/settings/claude/login', 'POST');
                        if (res.ok) {
                            const data = await res.json();
                            // Show the link in a popup/alert so user can click/copy it
                            alert("Claude CLI Auth:\\n\\n" + data.output + "\\n\\nComplete the login in your browser, then close this popup.");
                            // Refresh status
                            const resSt = await this.api('/api/settings/status');
                            if (resSt.ok) this.systemStatus = await resSt.json();
                        } else {
                            this.showToast("Failed to start Claude CLI login");
                        }
                    } catch (e) {
                        this.showToast("Error communicating with Claude CLI");
                    }
                },
                async deleteUser(id) {
                    if (!confirm("Are you sure?")) return;
                    const res = await this.api(`/api/users/${id}`, 'DELETE');
                    if (res.ok) { this.showToast("User Deleted"); this.loadUsers(); }
                },
                async saveSettings() {
                    const res = await this.api('/api/settings', 'PUT', this.settings);
                    if (res.ok) this.showToast("Settings Saved");
                },
                async testInvestec() {
                    await this.saveSettings();
                    const res = await this.api('/api/settings/test-investec', 'POST');
                    if (res.ok) { this.showToast("Investec Connected"); this.loadData(); } else this.showToast("Failed");
                },
                async testEmail() {
                    await this.saveSettings();
                    const res = await this.api('/api/settings/test-email', 'POST');
                    if (res.ok) this.showToast("Email Sent"); else this.showToast("Failed");
                },
                async testAi() {
                    const res = await this.api('/api/settings/test-ai', 'POST', this.settings);
                    if (res.ok) this.showToast("Primary AI Online"); else this.showToast("Test Failed");
                },
                async categorizeHistory() {
                    if (this.categorizing) return;
                    this.categorizing = true;
                    this.categorizeResult = "";
                    try {
                        const res = await this.api('/api/transactions/categorize-all', 'POST');
                        if (!res.ok) {
                            let msg = "Categorization failed";
                            try { const err = await res.json(); msg = err.error || msg; } catch {}
                            throw new Error(msg);
                        }
                        const data = await res.json();
                        this.categorizeResult = data.message;
                        this.showToast("History Categorized");
                        this.loadData();
                        this.loadCharts();
                    } catch (err) {
                        this.showToast(err.message);
                    } finally {
                        this.categorizing = false;
                    }
                },
                async ignoreFixedCost(name) {
                    if (!this.settings.ignoredFixedCosts) this.settings.ignoredFixedCosts = [];
                    if (!this.settings.ignoredFixedCosts.includes(name)) {
                        this.settings.ignoredFixedCosts.push(name);
                        await this.saveSettings();
                        this.loadData(); // Reload to refresh health stats and upcoming list
                    }
                },
                async unignoreFixedCost(name) {
                    if (!this.settings.ignoredFixedCosts) return;
                    const idx = this.settings.ignoredFixedCosts.indexOf(name);
                    if (idx > -1) {
                        this.settings.ignoredFixedCosts.splice(idx, 1);
                        await this.saveSettings();
                        this.loadData();
                    }
                },
                async loadCharts() {
                    try {
                        const [resCat, resBal] = await Promise.all([
                            this.api('/api/chartdata/spending-by-category?days=30'),
                            this.api('/api/chartdata/daily-balance?days=30')
                        ]);
                        if (resCat.ok) this.renderCategoryChart(await resCat.json());
                        if (resBal.ok) this.renderBalanceChart(await resBal.json());
                    } catch (err) {
                        console.error("Failed to load charts", err);
                    }
                },
                renderCategoryChart(data) {
                    const ctx = document.getElementById('categoryChart')?.getContext('2d');
                    if (!ctx) return;
                    if (this.categoryChart) this.categoryChart.destroy();
                    this.categoryChart = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: data.map(d => d.label),
                            datasets: [{
                                data: data.map(d => d.value),
                                backgroundColor: ['#D4A931','#A87E20','#E8C55A','#7A5C11','#F5D76E','#5E4610','#C4952A','#EDD770'],
                                borderColor: '#141414',
                                borderWidth: 2
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    position: 'right',
                                    labels: { boxWidth: 10, font: { size: 10 }, color: '#7A7670' }
                                }
                            }
                        }
                    });
                },
                renderBalanceChart(data) {
                    const ctx = document.getElementById('balanceChart')?.getContext('2d');
                    if (!ctx) return;
                    if (this.balanceChart) this.balanceChart.destroy();
                    this.balanceChart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: data.map(d => new Date(d.date).toLocaleDateString()),
                            datasets: [{
                                label: 'Balance',
                                data: data.map(d => d.balance),
                                borderColor: '#D4A931',
                                fill: true,
                                backgroundColor: 'rgba(212,169,49,0.08)',
                                tension: 0.4,
                                pointRadius: 0
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: {
                                    beginAtZero: false,
                                    grid: { color: 'rgba(255,255,255,0.04)' },
                                    ticks: { font: { size: 10 }, color: '#555250' }
                                },
                                x: {
                                    grid: { color: 'rgba(255,255,255,0.04)' },
                                    ticks: { font: { size: 10 }, color: '#555250', maxRotation: 45, minRotation: 45 }
                                }
                            }
                        }
                    });
                },
                async testFallbackAi() {
                    await this.saveSettings();
                    const res = await this.api('/api/settings/test-fallback-ai', 'POST');
                    if (res.ok) { this.showToast("Fallback AI Connected"); this.loadData(); } else this.showToast("Fallback Failed");
                },
                async testThinkingAi() {
                    await this.saveSettings();
                    const res = await this.api('/api/settings/test-thinking-ai', 'POST');
                    if (res.ok) {
                        this.showToast("Thinking AI Connected");
                        this.loadData();
                    } else this.showToast("Thinking Failed");
                },
                async resetThinkingPrompt() {
                    const defRes = await this.api('/api/settings/thinking-prompt-default');
                    if (defRes.ok) {
                        this.settings.thinkingModelInstructions = await defRes.text();
                        this.showToast("Reset to default instructions");
                    } else {
                        this.settings.thinkingModelInstructions = '';
                        this.showToast("Could not load default — cleared instead");
                    }
                },
                async testTelegram() {
                    await this.saveSettings();
                    const res = await this.api('/api/settings/test-telegram', 'POST');
                    if (res.ok) this.showToast("Telegram Sent"); else this.showToast("Failed");
                },
                async testWhatsApp() {
                    await this.saveSettings();
                    const res = await this.api('/api/settings/test-whatsapp', 'POST');
                    if (res.ok) this.showToast("WhatsApp Sent"); else this.showToast("Failed");
                },
                async registerWebhook() {
                    let baseUrl = prompt("Enter your public HTTPS URL (e.g., https://yourdomain.com):", "https://financeai.wethegordons.co.za");
                    if (!baseUrl) return;
                    baseUrl = baseUrl.replace(/\/$/, "").replace(/\/telegram\/webhook$/, "");
                    const fullUrl = baseUrl + '/telegram/webhook';
                    try {
                        const res = await this.api('/telegram/setup-webhook', 'POST', { Url: fullUrl });
                        if (res.ok) this.showToast("Webhook Registered!");
                        else this.showToast("Failed");
                    } catch { this.showToast("Network Error"); }
                },
                async forceRepull() {
                    if (!confirm("Resync all transactions?")) return;
                    const res = await this.api('/api/settings/force-repull', 'POST');
                    if (res.ok) this.showToast("Sync Started");
                },
                async categorizeExisting() {
                    this.categorizing = true;
                    try {
                        const res = await this.api('/api/settings/categorize-existing', 'POST');
                        if (res.ok) {
                            const msg = await res.text();
                            this.showToast(msg);
                            this.loadData();
                        } else this.showToast("Failed to categorize");
                    } finally {
                        this.categorizing = false;
                    }
                },
                async sendReportNow() {
                    this.sendingReport = true;
                    try {
                        const res = await this.api('/api/settings/send-report-now', 'POST');
                        if (res.ok) this.showToast("Report Sent"); else this.showToast("Failed");
                    } finally { this.sendingReport = false; }
                },
                addAdjustment() {
                    if (!this.newAdjustment.amount || this.newAdjustment.amount <= 0) {
                        this.showToast("Please enter a valid amount");
                        return;
                    }
                    if (!this.newAdjustment.description.trim()) {
                        this.showToast("Please enter a description");
                        return;
                    }
                    this.simulationAdjustments.push({ ...this.newAdjustment });
                    this.newAdjustment.amount = 0;
                    this.newAdjustment.description = '';
                },
                removeAdjustment(idx) {
                    this.simulationAdjustments.splice(idx, 1);
                },
                async runSimulation() {
                    this.simLoading = true;
                    try {
                        const res = await this.api('/api/simulation', 'POST', {
                            adjustments: this.simulationAdjustments
                        });
                        if (res.ok) {
                            this.simulationResult = await res.json();
                            this.showToast("Simulation Complete");
                        } else {
                            this.showToast("Simulation Failed");
                        }
                    } catch (err) {
                        this.showToast("Network Error");
                    } finally {
                        this.simLoading = false;
                    }
                },
                async fetchLogs() {
                    const res = await this.api('/api/logs');
                    if (res.ok) this.logs = await res.json();
                },
                async loadLogFiles() {
                    const res = await this.api('/api/logs/files');
                    if (res.ok) this.logFileDates = await res.json();
                },
                async loadLogFileContent() {
                    if (!this.logFileDate) return;
                    this.logFileLoading = true;
                    this.logFileContent = '';
                    try {
                        const res = await this.api(`/api/logs/files/${this.logFileLevel}/${this.logFileDate}/tail?lines=200`);
                        if (res.ok) this.logFileContent = await res.text();
                        else this.showToast('Log file not found');
                    } finally {
                        this.logFileLoading = false;
                    }
                },
                startLogPolling() {
                    this.stopLogPolling();
                    this.logPolling = setInterval(() => this.fetchLogs(), 3000);
                },
                stopLogPolling() {
                    if (this.logPolling) {
                        clearInterval(this.logPolling);
                        this.logPolling = null;
                    }
                },
                getLogLevelClass(level) {
                    level = level.toUpperCase();
                    if (level === 'ERROR' || level === 'CRITICAL') return 'text-red-600 bg-red-50';
                    if (level === 'WARNING') return 'text-amber-600 bg-amber-50';
                    if (level === 'INFORMATION') return 'text-blue-600 bg-blue-50';
                    return 'text-slate-500 bg-slate-50';
                },
                showToast(msg) {
                    this.toast = { show: true, msg };
                    setTimeout(() => this.toast.show = false, 3000);
                },
                formatTime(d) { return d ? new Date(d).toLocaleTimeString() : 'Never'; },
                formatDate(d) { return d ? new Date(d).toLocaleDateString(undefined, { day: 'numeric', month: 'short' }) : ''; },
                formatCurrency(v) {
                    const culture = this.settings.currencyCulture || 'en-ZA';
                    const currencyMap = { 'en-ZA': 'ZAR', 'en-US': 'USD', 'en-GB': 'GBP' };
                    const currency = currencyMap[culture] || 'ZAR';
                    const key = `${culture}-${currency}`;
                    if (!this._formatters) this._formatters = {};
                    if (!this._formatters[key]) {
                        this._formatters[key] = new Intl.NumberFormat(culture, { style: 'currency', currency });
                    }
                    return this._formatters[key].format(v);
                }
            }
        }).mount('#app');
    </script>
</body>
