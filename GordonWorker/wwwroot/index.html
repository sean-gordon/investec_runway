<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gordon Finance Engine</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">
    <!-- CDN assets are version-pinned and SRI-verified -->
    <script
        src="https://unpkg.com/vue@3.4.21/dist/vue.global.prod.js"
        integrity="sha384-6pS1WSZJY7wOk6qQTa9C9U2W1/qzqL7iYoMil7qn9KFeN5fZDAwIExgCd7U5AH+X"
        crossorigin="anonymous"
        referrerpolicy="no-referrer"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script
        src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"
        integrity="sha384-e6cc9LaIG7xZ3XD5B+jtr1NhTWPQGQdRCh6xiZ+ZFUtWCpg4ycv3Sh+SkZoopvUY"
        crossorigin="anonymous"
        referrerpolicy="no-referrer"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 900: '#0c4a6e' }
                    }
                }
            }
        }
    </script>
    <style>
        /* ── GORDON DYNAMIC THEME ENGINE ── */
        :root {
            /* ── Default Light Palette ── */
            --app-bg: #f8fafc;
            --app-surface: #ffffff;
            --card-bg: #ffffff;
            --card-bg-alt: #f1f5f9;
            --card-border: #e2e8f0;
            --card-border-alt: #cbd5e1;

            --text-main: #0f172a;
            --text-body: #334155;
            --text-dim: #64748b;
            --text-muted: #94a3b8;
            --text-faint: #cbd5e1;

            --accent: #0ea5e9;
            --accent-lt: #38bdf8;
            --accent-dk: #0284c7;
            --accent-glow: rgba(14, 165, 233, 0.1);
            --accent-shadow: rgba(14, 165, 233, 0.4);

            --s5: #e2e8f0; --s6: #cbd5e1; --b3: #cbd5e1;
        }

        body {
            background-color: var(--app-bg);
            color: var(--text-body);
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease, color 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        [v-cloak] { display: none; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: var(--app-bg); }
        ::-webkit-scrollbar-thumb { background: var(--s5); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-dk); }

        /* ── Component Overrides ── */
        .bg-white      { background-color: var(--card-bg) !important; }
        .bg-slate-50   { background-color: var(--app-surface) !important; }
        .bg-slate-50\/50 { background-color: rgba(255,255,255,0.05) !important; }
        .bg-slate-100  { background-color: var(--app-surface) !important; }
        .bg-slate-200  { background-color: var(--card-bg-alt) !important; }
        
        .text-slate-900, .text-slate-800 { color: var(--text-main) !important; }
        .text-slate-700 { color: var(--text-body) !important; }
        .text-slate-600 { color: var(--text-dim) !important; }
        .text-slate-500 { color: var(--text-muted) !important; }
        .text-slate-400 { color: var(--text-faint) !important; }

        .border-slate-50, .border-slate-100 { border-color: var(--card-border) !important; }
        .border-slate-200 { border-color: var(--card-border-alt) !important; }
        .divide-slate-50 > *, .divide-slate-100 > * { border-color: var(--card-border) !important; }

        .bg-brand-600 { background-color: var(--accent) !important; }
        .text-brand-600 { color: var(--accent) !important; }
        .bg-brand-50 { background-color: var(--accent-glow) !important; color: var(--accent) !important; }
        .border-brand-600 { border-color: var(--accent) !important; }

        /* Chart adjustments */
        canvas { filter: brightness(0.9) contrast(1.1); }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 h-screen overflow-hidden flex flex-col">

    <!-- HELP TOOLTIP COMPONENT -->
    <script type="text/x-template" id="help-tooltip-template">
        <div class="relative inline-block ml-1 group">
            <span class="cursor-help text-slate-400 hover:text-brand-600 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
            </span>
            <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 hidden group-hover:block w-48 bg-slate-800 text-white text-[10px] p-2 rounded shadow-lg z-50 pointer-events-none text-center">
                {{ text }}
                <div class="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-slate-800"></div>
            </div>
        </div>
    </script>

    <div id="app" v-cloak class="flex-1 flex flex-col h-full overflow-hidden relative">

        <!-- AUTH OVERLAY -->
        <div v-if="!auth.token" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-4">
            <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">
                <div class="bg-brand-600 p-8 text-center text-white">
                    <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-4 backdrop-blur-sm">
                        <span class="text-3xl font-bold">G</span>
                    </div>
                    <h2 class="text-2xl font-bold">Gordon Finance</h2>
                    <p class="text-white/70 text-sm mt-1">Actuarial spending insights.</p>
                </div>
                <div class="p-8">
                    <div v-if="authView === 'login'" class="space-y-4">
                        <h3 class="text-lg font-bold text-slate-800">Sign In</h3>
                        <input v-model="loginForm.username" type="text" placeholder="Username"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none">
                        <input v-model="loginForm.password" type="password" placeholder="Password" @keyup.enter="login"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none">
                        <button @click="login" :disabled="loading"
                            class="w-full bg-brand-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-brand-700 transition-all">
                            {{ loading ? '...' : 'Sign In' }}
                        </button>
                        <p class="text-center text-xs text-slate-500 mt-4 cursor-pointer hover:underline"
                            @click="authView = 'register'">Create an account</p>
                    </div>
                    <div v-else class="space-y-4">
                        <h3 class="text-lg font-bold text-slate-800">Register</h3>
                        <input v-model="registerForm.username" type="text" placeholder="Choose Username"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none">
                        <input v-model="registerForm.password" type="password" placeholder="Choose Password"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none">
                        <button @click="register" :disabled="loading"
                            class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-slate-900 transition-all">
                            {{ loading ? '...' : 'Register' }}
                        </button>
                        <p class="text-center text-xs text-slate-500 mt-4 cursor-pointer hover:underline"
                            @click="authView = 'login'">Back to Login</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- MAIN APP -->
        <template v-if="auth.token">
            <header class="bg-white border-b border-slate-200 h-16 shrink-0 flex items-center justify-between px-4 lg:px-8 z-20 shadow-sm">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-brand-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                        <span class="text-xl font-bold">G</span>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-slate-900 leading-tight">Gordon</h1>
                        <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-wider">{{ auth.username }}
                            <span v-if="auth.role === 'Admin'" class="bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded-full ml-1 text-[8px]">ADMIN</span>
                        </p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="hidden sm:flex items-center gap-1.5 bg-green-50 px-2.5 py-1 rounded-full border border-green-100 shadow-sm">
                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
                        <span class="text-[10px] font-bold text-green-700 uppercase tracking-tight">System Secured</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <button @click="toggleTheme" 
                            class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-500 hover:text-brand-600 transition-colors"
                            :title="'Switch to ' + (currentTheme === 'light' ? 'Design' : 'Light') + ' Theme'">
                            <span>{{ currentTheme === 'light' ? '🌙' : '☀️' }}</span>
                        </button>
                        <button @click="logout" class="text-xs font-bold text-slate-400 hover:text-red-500 transition-colors">LOGOUT</button>
                    </div>
                </div>
            </header>

            <div class="flex-1 flex overflow-hidden max-w-7xl mx-auto w-full">
                <!-- SIDEBAR -->
                <aside class="hidden md:flex w-64 flex-col border-r border-slate-200 bg-white">
                    <nav class="flex-1 p-4 space-y-1">
                        <button v-for="item in menuItems" :key="item.id" @click="activeTab = item.id"
                            v-show="!item.adminOnly || auth.role === 'Admin'"
                            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all"
                            :class="activeTab === item.id ? 'bg-brand-50 text-brand-700' : 'text-slate-600 hover:bg-slate-50'">
                            <span>{{ item.icon }}</span> {{ item.name }}
                        </button>
                        <button @click="activeTab = 's-rawdata'"
                            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all"
                            :class="activeTab === 's-rawdata' ? 'bg-brand-50 text-brand-700' : 'text-slate-600 hover:bg-slate-50'">
                            <span>📊</span> Raw Data Ledger
                        </button>
                    </nav>
                    <div class="p-4 border-t border-slate-100 bg-slate-50/50">
                        <button @click="sendReportNow" :disabled="sendingReport"
                            class="w-full flex items-center justify-center gap-2 py-2.5 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-700 hover:border-brand-300 hover:text-brand-600 shadow-sm transition-all active:scale-95">
                            <span v-if="sendingReport" class="animate-spin">⏳</span>
                            <span v-else>📧</span>
                            {{ sendingReport ? 'Sending...' : 'Send Weekly Now' }}
                        </button>
                    </div>
                </aside>

                <!-- CONTENT -->
                <main class="flex-1 overflow-y-auto p-4 lg:p-8 pb-24 md:pb-8 bg-slate-50">

                    <!-- DASHBOARD -->
                    <div v-if="activeTab === 'dashboard'" class="space-y-6">
                        <div class="flex justify-between items-center">
                            <h2 class="text-2xl font-bold">Dashboard</h2>
                            <div class="flex gap-2">
                                <button @click="forceRepull"
                                    class="text-xs bg-white border border-slate-200 px-3 py-1.5 rounded-lg font-bold hover:bg-slate-50 shadow-sm">🔄 Sync Investec</button>
                            </div>
                        </div>

                        <!-- Status Grid -->
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Investec</p>
                                <p class="text-lg font-bold" :class="systemStatus.investecOnline ? 'text-green-600' : 'text-red-600'">
                                    {{ systemStatus.investecOnline ? 'Online' : 'Offline' }}
                                </p>
                            </div>
                            <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">AI Brain</p>
                                <p class="text-lg font-bold text-green-600">Ready</p>
                            </div>
                            <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">YoY Change</p>
                                <p v-if="healthStats" class="text-lg font-bold" :class="healthStats.YoYChangePercentage > 0 ? 'text-red-600' : 'text-green-600'">
                                    {{ healthStats.YoYChangePercentage > 0 ? '+' : '' }}{{ healthStats.YoYChangePercentage }}%
                                </p>
                                <p v-else class="text-lg font-bold text-slate-300 italic">No Data</p>
                            </div>
                            <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Database</p>
                                <p class="text-lg font-bold text-indigo-600">Active</p>
                            </div>
                        </div>

                        <!-- Metrics & Charts -->
                        <div v-if="healthStats" class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden p-6">
                            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                                <div>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Payday Projection</p>
                                    <h3 class="text-2xl font-black mt-1" :class="healthStats.ProjectedBalanceAtPayday >= 0 ? 'text-green-600' : 'text-red-600'">
                                        {{ formatCurrency(healthStats.ProjectedBalanceAtPayday) }}
                                    </h3>
                                    <p class="text-[10px] text-slate-400 font-medium">In {{ healthStats.DaysUntilNextSalary }} days</p>
                                </div>
                                <div>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Est. Runway</p>
                                    <h3 class="text-2xl font-black mt-1" :class="healthStats.RunwayDays >= healthStats.DaysUntilNextSalary ? 'text-green-600' : 'text-red-600'">
                                        {{ healthStats.RunwayDays }} <span class="text-sm font-medium">days</span>
                                    </h3>
                                    <p class="text-[10px] text-slate-400 font-medium">Survival: {{ healthStats.ProbabilityToReachPayday }}</p>
                                </div>
                                <div>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Daily Burn (EMA)</p>
                                    <h3 class="text-2xl font-black mt-1 text-slate-800">{{ formatCurrency(healthStats.WeightedDailyBurn) }}</h3>
                                    <p class="text-[10px] text-slate-400 font-medium">Alpha: {{ settings.actuarialAlpha }}</p>
                                </div>
                                <div>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Upcoming Bills</p>
                                    <h3 class="text-2xl font-black mt-1 text-orange-600">{{ formatCurrency(healthStats.UpcomingExpectedPaymentsTotal) }}</h3>
                                    <p class="text-[10px] text-slate-400 font-medium">{{ healthStats.UpcomingFixedCosts?.length || 0 }} items</p>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                                <h3 class="font-bold text-slate-800 text-sm mb-4">Spending by Category</h3>
                                <div class="h-64"><canvas id="categoryChart"></canvas></div>
                            </div>
                            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                                <h3 class="font-bold text-slate-800 text-sm mb-4">Balance History</h3>
                                <div class="h-64"><canvas id="balanceChart"></canvas></div>
                            </div>
                        </div>

                        <!-- Recent Activity -->
                        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
                            <div class="px-6 py-4 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
                                <h3 class="font-bold text-slate-800 text-sm">Recent Activity</h3>
                                <button @click="activeTab = 's-rawdata'" class="text-[10px] font-bold text-brand-600 hover:underline">VIEW ALL</button>
                            </div>
                            <table class="w-full text-left text-sm">
                                <tbody class="divide-y divide-slate-50">
                                    <tr v-for="tx in recentTransactions" :key="tx.id" class="hover:bg-slate-50/80 transition-colors">
                                        <td class="px-6 py-4">
                                            <p class="font-bold text-slate-900 truncate max-w-xs">{{ tx.description }}</p>
                                            <p class="text-[10px] text-slate-400">{{ formatDate(tx.transactionDate) }} • {{ tx.category }}</p>
                                        </td>
                                        <td class="px-6 py-4 text-right">
                                            <p class="font-mono font-bold" :class="tx.amount < 0 ? 'text-slate-900' : 'text-green-600'">{{ formatCurrency(tx.amount) }}</p>
                                            <p class="text-[9px] text-slate-400">Bal: {{ formatCurrency(tx.balance) }}</p>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- RAW DATA LEDGER -->
                    <div v-if="activeTab === 's-rawdata'" class="space-y-6">
                        <div class="flex justify-between items-center">
                            <h2 class="text-xl font-bold">Raw Ledger</h2>
                            <div class="flex gap-2">
                                <input v-model="ledgerSearch" placeholder="Search..." class="px-3 py-1.5 text-xs bg-white border border-slate-200 rounded-lg outline-none">
                                <select v-model="ledgerDateRange" class="text-xs border border-slate-200 rounded-lg px-2">
                                    <option :value="30">30 Days</option>
                                    <option :value="90">90 Days</option>
                                    <option :value="0">All Time</option>
                                </select>
                                <button @click="loadRawData" class="bg-slate-200 px-3 py-1.5 rounded-lg text-xs font-bold">Refresh</button>
                            </div>
                        </div>
                        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden overflow-x-auto">
                            <table class="w-full text-left text-xs whitespace-nowrap">
                                <thead class="bg-slate-50 border-b border-slate-200 sticky top-0">
                                    <tr>
                                        <th class="px-4 py-3 font-bold text-slate-500 uppercase">Date</th>
                                        <th class="px-4 py-3 font-bold text-slate-500 uppercase">Amount</th>
                                        <th class="px-4 py-3 font-bold text-slate-500 uppercase">Category</th>
                                        <th class="px-4 py-3 font-bold text-slate-500 uppercase">Description</th>
                                        <th class="px-4 py-3 font-bold text-slate-500 uppercase">Notes</th>
                                        <th class="px-4 py-3 font-bold text-slate-500 uppercase text-center">Excluded?</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100">
                                    <tr v-for="tx in filteredRawTransactions" :key="tx.id" :class="tx.isExcluded ? 'opacity-40 bg-slate-50' : ''">
                                        <td class="px-4 py-3">{{ formatDate(tx.transactionDate) }}</td>
                                        <td class="px-4 py-3 font-mono font-bold" :class="tx.amount < 0 ? 'text-red-600' : 'text-green-600'">{{ formatCurrency(tx.amount) }}</td>
                                        <td class="px-4 py-3">
                                            <select @change="updateCategory(tx, $event.target.value)" class="bg-transparent border-none focus:ring-0">
                                                <option :value="tx.category">{{ tx.category || 'None' }}</option>
                                                <option v-for="c in knownCategories" :key="c" :value="c">{{ c }}</option>
                                            </select>
                                        </td>
                                        <td class="px-4 py-3 truncate max-w-xs">{{ tx.description }}</td>
                                        <td class="px-4 py-3"><input v-model="tx.notes" @blur="updateNote(tx)" class="bg-transparent border-none w-full italic"></td>
                                        <td class="px-4 py-3 text-center">
                                            <button @click="toggleExclusion(tx)" class="px-2 py-1 border rounded" :class="tx.isExcluded ? 'bg-red-50 text-red-600' : 'text-slate-400 hover:text-red-600'">
                                                {{ tx.isExcluded ? 'INCLUDED' : 'EXCLUDE' }}
                                            </button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- SETTINGS WRAPPER -->
                    <div v-if="activeTab.startsWith('s-')" class="max-w-3xl space-y-6 pb-20">
                        <div class="flex justify-between items-center">
                            <h2 class="text-xl font-bold">Configuration</h2>
                            <button @click="saveSettings" class="bg-brand-600 text-white px-6 py-2 rounded-lg font-bold shadow-md hover:bg-brand-700 transition-all">Save Changes</button>
                        </div>

                        <!-- IDENTITY -->
                        <div v-if="activeTab === 's-identity'" class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 space-y-4">
                            <div><label class="text-xs font-bold text-slate-700 block">Display Name</label><input v-model="settings.userName" class="w-full mt-1.5 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm"></div>
                            <div><label class="text-xs font-bold text-slate-700 block">Currency Culture</label><input v-model="settings.currencyCulture" class="w-full mt-1.5 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm"></div>
                        </div>

                        <!-- DESIGN & THEME -->
                        <div v-if="activeTab === 's-theming'" class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 space-y-4">
                                    <h3 class="font-bold text-sm border-b pb-2">Import from URL</h3>
                                    <div class="flex gap-2">
                                        <input v-model="themeUrl" placeholder="https://getdesign.md/brand/design-md" class="flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs">
                                        <button @click="addThemeFromUrl" class="bg-brand-600 text-white px-4 py-2 rounded-lg text-xs font-bold">Import</button>
                                    </div>
                                </div>
                                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 space-y-4">
                                    <h3 class="font-bold text-sm border-b pb-2">Manual JSON</h3>
                                    <textarea v-model="manualThemeJson" rows="2" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-[10px] font-mono"></textarea>
                                    <button @click="addThemeManual" class="w-full bg-slate-800 text-white py-2 rounded-lg text-xs font-bold">Apply JSON</button>
                                </div>
                            </div>
                            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                                <h3 class="font-bold text-sm border-b pb-4 mb-4">Saved Palettes</h3>
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div v-for="t in themes" :key="t.id" @click="applyTheme(t)" 
                                        class="p-4 border rounded-xl cursor-pointer transition-all hover:border-brand-500"
                                        :class="selectedThemeId === t.id ? 'border-brand-600 bg-brand-50' : 'border-slate-100'">
                                        <p class="font-bold text-xs">{{ t.name }}</p>
                                        <div class="mt-2 h-1 w-full rounded-full flex overflow-hidden">
                                            <div :style="{background: t.variables['--accent']}" class="flex-1"></div>
                                            <div :style="{background: t.variables['--app-bg']}" class="flex-1"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- MATH & LOGIC -->
                        <div v-if="activeTab === 's-math'" class="space-y-6">
                            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 space-y-4">
                                <div class="grid grid-cols-2 gap-4">
                                    <div><label class="text-xs font-bold text-slate-700">Analysis Window</label><input v-model.number="settings.analysisWindowDays" type="number" class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm"></div>
                                    <div><label class="text-xs font-bold text-slate-700">EMA Alpha</label><input v-model.number="settings.actuarialAlpha" step="0.01" type="number" class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm"></div>
                                </div>
                                <div class="pt-4 border-t border-slate-100 flex items-center justify-between">
                                    <div>
                                        <p class="text-sm font-bold">Exclude Income from Analytics</p>
                                        <p class="text-[10px] text-slate-500">Ignore positive transactions in burn calculations.</p>
                                    </div>
                                    <input type="checkbox" v-model="settings.excludeIncomeFromAnalytics" class="w-5 h-5 text-brand-600 rounded">
                                </div>
                            </div>
                            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 space-y-4">
                                <div><label class="text-xs font-bold text-slate-700">Fixed Cost Keywords</label><textarea v-model="settings.fixedCostKeywords" class="w-full mt-1.5 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs font-mono"></textarea></div>
                                <div><label class="text-xs font-bold text-slate-700">Salary Keywords</label><textarea v-model="settings.salaryKeywords" class="w-full mt-1.5 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs font-mono"></textarea></div>
                            </div>
                        </div>

                        <!-- CONNECTIONS, BRAIN, ETC (Kept standard) -->
                        <div v-if="activeTab === 's-connections'" class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 space-y-4">
                            <div><label class="text-xs font-bold text-slate-700">Investec Client ID</label><input v-model="settings.investecClientId" class="w-full mt-1.5 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm font-mono"></div>
                            <div><label class="text-xs font-bold text-slate-700">Investec Secret</label><input v-model="settings.investecSecret" type="password" class="w-full mt-1.5 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm font-mono"></div>
                            <div><label class="text-xs font-bold text-slate-700">Investec API Key</label><input v-model="settings.investecApiKey" type="password" class="w-full mt-1.5 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm font-mono"></div>
                        </div>
                        
                        <div v-if="activeTab === 's-ai'" class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 space-y-4">
                             <div><label class="text-xs font-bold text-slate-700">AI Provider</label><select v-model="settings.aiProvider" class="w-full mt-1.5 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm"><option value="Ollama">Ollama</option><option value="Gemini">Gemini</option><option value="OpenAI">OpenAI</option></select></div>
                             <div><label class="text-xs font-bold text-slate-700">Model Name</label><input v-model="settings.ollamaModelName" class="w-full mt-1.5 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm"></div>
                        </div>
                    </div>

                    <!-- SYSTEM LOGS (Kept standard) -->
                    <div v-if="activeTab === 'logs'" class="h-full flex flex-col space-y-4">
                        <div class="flex-1 bg-slate-900 rounded-3xl border border-slate-800 p-4 overflow-auto">
                            <div v-for="l in filteredLogs" class="py-2 border-b border-slate-800 text-[10px] font-mono text-slate-300">
                                <span class="text-slate-500">{{ formatTime(l.timestamp) }}</span> 
                                <span class="px-1.5 py-0.5 rounded ml-2" :class="getLogLevelClass(l.level)">{{ l.level }}</span>
                                <span class="ml-2">{{ l.message }}</span>
                            </div>
                        </div>
                    </div>

                </main>
            </div>

            <!-- MOBILE NAV -->
            <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-2 z-50 flex justify-around">
                <button v-for="item in menuItems.slice(0, 4)" @click="activeTab = item.id" class="text-xl p-2">{{ item.icon }}</button>
                <button @click="activeTab = 's-math'" class="text-xl p-2">⚙️</button>
            </div>
        </template>

        <!-- TOAST -->
        <div v-if="toast.show" class="fixed top-4 right-4 z-[200] bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl font-bold text-sm">
            {{ toast.msg }}
        </div>

    </div>

    <script>
        const { createApp } = Vue;

        const BASE_THEME_VARIABLES = {
            '--app-bg': '#050505', '--app-surface': '#0A0A0A',
            '--card-bg': '#161618', '--card-bg-alt': '#1C1C1E',
            '--card-border': '#181818', '--card-border-alt': '#242427',
            '--accent': '#D4A931', '--accent-lt': '#E8C55A', '--accent-dk': '#A87E20',
            '--accent-glow': 'rgba(212,169,49,0.10)', '--accent-shadow': 'rgba(212,169,49,0.4)',
            '--text-main': '#FFFFFF', '--text-body': '#E2E8F0',
            '--text-dim': '#CBD5E1', '--text-muted': '#94A3B8', '--text-faint': '#64748B',
            '--s5': '#212121', '--s6': '#2A2A2A', '--b3': '#2C2C2C'
        };

        const LIGHT_DEFAULT = {
            '--app-bg': '#f8fafc', '--app-surface': '#ffffff', '--card-bg': '#ffffff', '--card-bg-alt': '#f1f5f9',
            '--card-border': '#e2e8f0', '--card-border-alt': '#cbd5e1', '--text-main': '#0f172a', '--text-body': '#334155',
            '--accent': '#0ea5e9', '--accent-lt': '#38bdf8', '--accent-dk': '#0284c7',
            '--accent-glow': 'rgba(14, 165, 233, 0.1)', '--accent-shadow': 'rgba(14, 165, 233, 0.4)',
            '--s5': '#e2e8f0', '--s6': '#cbd5e1', '--b3': '#cbd5e1'
        };

        function _hexToRgb(h) {
            let r=0,g=0,b=0;
            if(h.length==4){r="0x"+h[1]+h[1];g="0x"+h[2]+h[2];b="0x"+h[3]+h[3];}
            else if(h.length==7){r="0x"+h[1]+h[2];g="0x"+h[3]+h[4];b="0x"+h[5]+h[6];}
            return {r:parseInt(r),g:parseInt(g),b:parseInt(b)};
        }
        function _lum(h){const{r,g,b}=_hexToRgb(h);return 0.299*r+0.587*g+0.114*b;}
        function buildThemeFromColors(accent, bg) {
            const isDark = _lum(bg) < 128;
            return {
                '--app-bg': bg, '--app-surface': isDark ? _lighten(bg,0.05) : _darken(bg,0.05),
                '--card-bg': isDark ? _lighten(bg,0.1) : '#ffffff',
                '--accent': accent, '--accent-lt': _lighten(accent,0.2), '--accent-dk': _darken(accent,0.2),
                '--text-main': isDark ? '#ffffff' : '#0f172a', '--text-body': isDark ? '#e2e8f0' : '#334155'
            };
        }
        function _darken(h,a){const{r,g,b}=_hexToRgb(h);return '#'+[r,g,b].map(c=>Math.max(0,Math.round(c*(1-a))).toString(16).padStart(2,'0')).join('');}
        function _lighten(h,a){const{r,g,b}=_hexToRgb(h);return '#'+[r,g,b].map(c=>Math.min(255,Math.round(c+(255-c)*a)).toString(16).padStart(2,'0')).join('');}

        createApp({
            data() {
                return {
                    loading: false, sendingReport: false, categorizing: false,
                    auth: { token: localStorage.getItem('token'), username: localStorage.getItem('username'), role: localStorage.getItem('role') || 'User' },
                    authView: 'login', loginForm: { username: '', password: '' }, registerForm: { username: '', password: '' },
                    activeTab: 'dashboard',
                    currentTheme: localStorage.getItem('gordon_theme') || 'light',
                    selectedThemeId: localStorage.getItem('gordon_selected_theme_id') || 'light-default',
                    themes: [], themeUrl: '', manualThemeJson: '', importLoading: false,
                    menuItems: [
                        { id: 'dashboard', name: 'Dashboard', icon: '🏠' },
                        { id: 's-theming', name: 'Design & Theme', icon: '🎨' },
                        { id: 's-simulation', name: 'What-If', icon: '🔮' },
                        { id: 's-connections', name: 'Connections', icon: '🔗' },
                        { id: 's-math', name: 'Math & Logic', icon: '🧪' },
                        { id: 's-ai', name: 'Brain', icon: '🧠' },
                        { id: 'logs', name: 'Logs', icon: '📋' }
                    ],
                    settings: { userName: 'User', excludeIncomeFromAnalytics: true, actuarialAlpha: 0.15, analysisWindowDays: 90 },
                    systemStatus: { investecOnline: false, lastInvestecCheck: null },
                    healthStats: null, recentTransactions: [], rawTransactions: [],
                    ledgerSearch: '', ledgerDateRange: 30, knownCategories: ['Rent','Salary','Groceries','Transport','Health','Dining Out'],
                    toast: { show: false, msg: '' }, logs: [], logFilter: 'ALL'
                }
            },
            computed: {
                filteredLogs() { return this.logs.filter(l => this.logFilter === 'ALL' || l.level === this.logFilter); },
                filteredRawTransactions() { 
                    return this.rawTransactions.filter(t => !this.ledgerSearch || t.description.toLowerCase().includes(this.ledgerSearch.toLowerCase()));
                }
            },
            mounted() {
                this.loadThemes();
                if (this.auth.token) this.loadData();
            },
            methods: {
                async api(path, method = 'GET', body = null) {
                    const headers = { 'Authorization': `Bearer ${this.auth.token}`, 'Content-Type': 'application/json' };
                    const res = await fetch(path, { method, headers, body: body ? JSON.stringify(body) : null });
                    if (res.status === 401) this.logout();
                    return res;
                },
                async login() {
                    const res = await fetch('/api/auth/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(this.loginForm) });
                    if (res.ok) { 
                        const data = await res.json(); 
                        this.auth = { token: data.token, username: data.username, role: 'User' };
                        localStorage.setItem('token', data.token); this.loadData();
                    }
                },
                logout() { localStorage.clear(); location.reload(); },
                async loadData() {
                    const resS = await this.api('/api/settings'); if (resS.ok) this.settings = await resS.json();
                    const resSt = await this.api('/api/settings/status'); if (resSt.ok) this.systemStatus = await resSt.json();
                    const resH = await this.api('/api/settings/stats'); if (resH.ok) this.healthStats = await resH.json();
                    const resR = await this.api('/api/settings/recent-transactions'); if (resR.ok) this.recentTransactions = await resR.json();
                    this.loadCharts();
                },
                async loadRawData() {
                    const res = await this.api(`/api/transactions?days=${this.ledgerDateRange}`);
                    if (res.ok) this.rawTransactions = await res.json();
                },
                async loadCharts() {
                    const resC = await this.api('/api/chartdata/spending-by-category');
                    if (resC.ok) this.renderCategoryChart(await resC.json());
                    const resB = await this.api('/api/chartdata/daily-balance');
                    if (resB.ok) this.renderBalanceChart(await resB.json());
                },
                renderCategoryChart(data) {
                    const ctx = document.getElementById('categoryChart')?.getContext('2d'); if(!ctx) return;
                    if(this.catChart) this.categoryChart.destroy();
                    this.categoryChart = new Chart(ctx, { type: 'doughnut', data: { labels: data.map(d=>d.label), datasets: [{ data: data.map(d=>d.value), backgroundColor: ['#0ea5e9','#6366f1','#8b5cf6','#ec4899','#f43f5e','#f59e0b'] }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } } } });
                },
                renderBalanceChart(data) {
                    const ctx = document.getElementById('balanceChart')?.getContext('2d'); if(!ctx) return;
                    if(this.balChart) this.balanceChart.destroy();
                    this.balanceChart = new Chart(ctx, { type: 'line', data: { labels: data.map(d=>this.formatDate(d.date)), datasets: [{ label: 'Balance', data: data.map(d=>d.balance), borderColor: '#0ea5e9', tension: 0.4, fill: true, backgroundColor: 'rgba(14,165,233,0.1)' }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: false }, x: { ticks: { maxRotation: 45 } } } } });
                },
                toggleTheme() {
                    this.currentTheme = this.currentTheme === 'light' ? 'dark' : 'light';
                    const targetId = this.currentTheme === 'light' ? 'light-default' : 'lamborghini-dark';
                    const theme = this.themes.find(t => t.id === targetId);
                    if (theme) this.applyTheme(theme);
                },
                applyTheme(theme) {
                    const root = document.documentElement;
                    Object.keys(BASE_THEME_VARIABLES).forEach(k => root.style.removeProperty(k));
                    Object.entries(theme.variables).forEach(([k, v]) => root.style.setProperty(k, v));
                    this.selectedThemeId = theme.id;
                    localStorage.setItem('gordon_selected_theme_id', theme.id);
                },
                loadThemes() {
                    const lamborghini = { id: 'lamborghini-dark', name: 'Lamborghini Dark', variables: BASE_THEME_VARIABLES };
                    const light = { id: 'light-default', name: 'Gordon Light', variables: LIGHT_DEFAULT };
                    this.themes = [lamborghini, light];
                    const saved = localStorage.getItem('saved_themes');
                    if (saved) this.themes = [...this.themes, ...JSON.parse(saved)];
                    const current = this.themes.find(t => t.id === this.selectedThemeId) || light;
                    this.applyTheme(current);
                },
                async addThemeFromUrl() {
                    this.importLoading = true;
                    try {
                        const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(this.themeUrl)}`);
                        const data = await res.json();
                        const hexes = [...new Set([...data.contents.matchAll(/#([0-9A-Fa-f]{6})\b/g)].map(m => m[0]))];
                        const sorted = hexes.sort((a,b)=>_lum(a)-_lum(b));
                        const theme = { id: 'theme-'+Date.now(), name: 'Imported', variables: buildThemeFromColors(sorted[Math.floor(sorted.length*0.7)], sorted[0]) };
                        this.themes.push(theme); this.saveThemes(); this.applyTheme(theme);
                    } finally { this.importLoading = false; this.themeUrl = ''; }
                },
                saveThemes() { localStorage.setItem('saved_themes', JSON.stringify(this.themes.filter(t => !['lamborghini-dark','light-default'].includes(t.id)))); },
                async saveSettings() { const res = await this.api('/api/settings', 'PUT', this.settings); if (res.ok) this.showToast("Saved"); },
                async toggleExclusion(tx) {
                    tx.isExcluded = !tx.isExcluded;
                    await this.api(`/api/transactions/${tx.id}/toggle-exclusion?isExcluded=${tx.isExcluded}`, 'POST');
                    this.loadData();
                },
                async updateNote(tx) { await this.api(`/api/transactions/${tx.id}/note`, 'POST', tx.notes); },
                async updateCategory(tx, cat) { tx.category = cat; await this.api(`/api/transactions/${tx.id}/category`, 'POST', cat); this.loadCharts(); },
                showToast(msg) { this.toast = { show: true, msg }; setTimeout(() => this.toast.show = false, 3000); },
                formatCurrency(v) { return new Intl.NumberFormat('en-ZA', { style: 'currency', currency: 'ZAR' }).format(v); },
                formatDate(d) { return d ? new Date(d).toLocaleDateString(undefined, { day: 'numeric', month: 'short' }) : ''; },
                formatTime(d) { return d ? new Date(d).toLocaleTimeString() : 'Never'; },
                async forceRepull() { await this.api('/api/settings/force-repull', 'POST'); this.showToast("Syncing..."); },
                async sendReportNow() { this.sendingReport = true; await this.api('/api/settings/send-report-now', 'POST'); this.sendingReport = false; this.showToast("Sent"); }
            }
        }).mount('#app');
    </script>
</body>

</html>
