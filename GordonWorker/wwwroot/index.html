<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gordon Finance Engine</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js?v=3.5"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], outfit: ['Outfit', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#1A1400', 100: '#251B00', 200: '#3A2C00',
                            500: '#D4A931', 600: '#D4A931', 700: '#A87E20', 900: '#000000'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* ── GORDON × LAMBORGHINI DARK THEME ── */
        :root {
            /* ── THEME CONFIG (Change these to re-theme the entire app) ── */
            --app-bg: #050505;
            --app-surface: #0A0A0A;
            --card-bg: #161618;
            --card-bg-alt: #1C1C1E;
            --card-border: #181818;
            --card-border-alt: #242427;
            
            --text-main: #FFFFFF;
            --text-body: #E2E8F0;
            --text-dim: #CBD5E1;
            --text-muted: #94A3B8;
            --text-faint: #64748B;
            
            --accent: #D4A931;
            --accent-lt: #E8C55A;
            --accent-dk: #A87E20;
            --accent-glow: rgba(212,169,49,0.10);
            --accent-shadow: rgba(212,169,49,0.4);

            /* ── Technical Shorthands (Mappings for backward compatibility) ── */
            --gold: var(--accent); --gold-lt: var(--accent-lt); --gold-dk: var(--accent-dk);
            --gold-glow: var(--accent-glow);
            --s0: #000; --s1: var(--app-bg); --s2: var(--app-surface);
            --s3: var(--card-bg); --s4: var(--card-bg-alt); --s5: #212121; --s6: #2A2A2A;
            --b1: var(--card-border); --b2: var(--card-border-alt); --b3: #2C2C2C;
        }
        html { background: var(--app-bg); }
        body { -webkit-tap-highlight-color: transparent; }
        [v-cloak] { display: none; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: var(--app-bg); }
        ::-webkit-scrollbar-thumb { background: var(--s5); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-dk); }

        /* ── Surface overrides ── */
        .bg-white      { background-color: var(--card-bg) !important; }
        .bg-slate-50   { background-color: var(--app-surface) !important; }
        .bg-slate-50\/50 { background-color: rgba(10,10,10,0.5) !important; }
        .bg-slate-100  { background-color: var(--app-surface) !important; }
        .bg-slate-200  { background-color: var(--card-bg-alt) !important; }
        .bg-slate-800, .bg-slate-900 { background-color: var(--s0) !important; }
        .bg-slate-800\/15, .bg-white\/10 { background-color: rgba(255,255,255,0.05) !important; }
        .bg-indigo-50  { background-color: rgba(99,102,241,0.06) !important; }
        .bg-blue-50    { background-color: rgba(59,130,246,0.06) !important; }
        .bg-green-50   { background-color: rgba(34,197,94,0.06) !important; }
        .bg-red-50     { background-color: rgba(239,68,68,0.06) !important; }
        .bg-amber-50   { background-color: rgba(245,158,11,0.06) !important; }
        .bg-purple-50  { background-color: rgba(168,85,247,0.06) !important; }
        .bg-emerald-50 { background-color: var(--accent-glow) !important; }
        .bg-yellow-50  { background-color: rgba(234,179,8,0.06) !important; }

        /* ── Text ── */
        .text-slate-900, .text-slate-800 { color: var(--text-main) !important; }
        .text-slate-700 { color: var(--text-body) !important; }
        .text-slate-600 { color: var(--text-dim) !important; }
        .text-slate-500 { color: var(--text-muted) !important; }
        .text-slate-400 { color: var(--text-faint) !important; }
        .text-slate-300 { color: #475569 !important; }
        .text-indigo-900, .text-indigo-800, .text-indigo-700 { color: #A5B4FC !important; }
        .text-emerald-700, .text-emerald-600 { color: var(--accent) !important; }
        .text-green-600 { color: #4ade80 !important; }
        .text-green-500 { color: #4ade80 !important; }
        .text-amber-700 { color: var(--gold-lt) !important; }
        .text-amber-500 { color: var(--accent) !important; }
        .text-yellow-400 { color: var(--gold-lt) !important; }

        /* ── Borders ── */
        .border-slate-50, .border-slate-100 { border-color: var(--card-border) !important; }
        .border-slate-200 { border-color: var(--card-border-alt) !important; }
        .border-slate-300 { border-color: var(--b3) !important; }
        .border-slate-700 { border-color: var(--b3) !important; }
        .divide-slate-100 > * { border-color: var(--card-border) !important; }
        .divide-slate-200 > * { border-color: var(--card-border-alt) !important; }
        .border-emerald-200 { border-color: rgba(212,169,49,.25) !important; }
        .border-indigo-600  { border-color: rgba(99,102,241,.4) !important; }
        .border-red-100     { border-color: rgba(239,68,68,.15) !important; }
        .border-green-100   { border-color: rgba(34,197,94,.2) !important; }
        .border-amber-100   { border-color: rgba(245,158,11,.2) !important; }
        .border-brand-100   { border-color: rgba(212,169,49,.2) !important; }

        /* ── Brand → Gold ── */
        .bg-brand-600 { background-color: var(--accent) !important; }
        .bg-brand-700 { background-color: var(--accent-dk) !important; }
        .bg-brand-50  { background-color: var(--accent-glow) !important; }
        .bg-brand-900 { background-color: #000 !important; }
        .text-brand-600 { color: var(--accent) !important; }
        .text-brand-700, .text-brand-900 { color: var(--accent-dk) !important; }
        .border-brand-600 { border-color: var(--accent) !important; }
        .border-brand-200 { border-color: rgba(212,169,49,.3) !important; }
        .border-brand-300 { border-color: rgba(212,169,49,.4) !important; }
        .hover\:text-brand-600:hover { color: var(--accent) !important; }
        .hover\:bg-brand-700:hover   { background-color: var(--accent-dk) !important; }
        .hover\:border-brand-300:hover { border-color: rgba(212,169,49,.4) !important; }
        a.bg-brand-600, button.bg-brand-600 { color: #000 !important; font-weight: 700 !important; }

        /* ── Auth panel ── */
        .bg-brand-600.p-8 { background-color: var(--s0) !important; border-bottom: 1px solid var(--card-border-alt); }

        /* ── Inputs & selects ── */
        input:not([type=range]):not([type=checkbox]):not([type=radio]),
        select, textarea {
            background: var(--app-surface) !important;
            border-color: var(--card-border-alt) !important;
            color: #F0EBE0 !important;
        }
        input::placeholder, textarea::placeholder { color: #4A4845 !important; }
        input[type=range] { accent-color: var(--accent); }

        /* ── Hover states ── */
        .hover\:bg-slate-50:hover  { background-color: var(--card-bg) !important; }
        .hover\:bg-slate-200:hover { background-color: var(--card-bg-alt) !important; }
        .hover\:bg-slate-800:hover { background-color: var(--card-border) !important; }
        .hover\:bg-slate-900:hover { background-color: var(--s0) !important; }

        .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease; }
        .card-hover:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 12px 32px rgba(0,0,0,0.95), 0 0 0 1px rgba(212,169,49,0.15) !important;
            border-color: rgba(212,169,49,0.3) !important;
        }

        .active-nav-glow {
            box-shadow: inset 0 0 12px rgba(212,169,49,0.05), 0 0 20px rgba(212,169,49,0.05);
            border: 1px solid rgba(212,169,49,0.15) !important;
        }

        /* ── Shadows ── */
        .shadow-sm  { box-shadow: 0 1px 4px rgba(0,0,0,.8), 0 0 0 1px var(--card-border) !important; }
        .shadow     { box-shadow: 0 2px 8px rgba(0,0,0,.9), 0 0 0 1px var(--card-border) !important; }
        .shadow-md  { box-shadow: 0 4px 12px rgba(0,0,0,.9), 0 0 0 1px var(--card-border-alt) !important; }
        .shadow-lg  { box-shadow: 0 8px 20px rgba(0,0,0,.95), 0 0 0 1px rgba(212,169,49,.08) !important; }
        .shadow-xl  { box-shadow: 0 12px 32px rgba(0,0,0,.95), 0 0 0 1px rgba(212,169,49,.12) !important; }
        .shadow-2xl { box-shadow: 0 20px 50px rgba(0,0,0,.98), 0 0 0 1px rgba(212,169,49,.18) !important; }

        /* ── Table ── */
        thead tr { background-color: var(--s2) !important; }
        tbody tr:hover { background-color: var(--s3) !important; }

        /* ── Chart canvas — let Chart.js handle its own colors ── */
        canvas { background: transparent !important; }

        /* ── Gradients used in Health panel ── */
        .from-brand-50.to-indigo-50,
        .bg-gradient-to-r.from-brand-50 { background: linear-gradient(90deg, var(--gold-glow), rgba(99,102,241,0.06)) !important; }

        /* ── Misc status ── */
        .text-emerald-400 { color: #4ade80 !important; }
        .bg-indigo-100 { background-color: rgba(99,102,241,0.12) !important; }
        .text-indigo-600, .text-blue-600 { color: #818cf8 !important; }
        .text-red-500, .text-red-600 { color: #f87171 !important; }
        .text-orange-400 { color: #fb923c !important; }
        .bg-orange-50 { background-color: rgba(249,115,22,0.06) !important; }
        .text-purple-600 { color: #c084fc !important; }
        .text-teal-600 { color: #2dd4bf !important; }

        /* ── Log viewer ── */
        .font-mono { color: #B0AA9E; }
        .text-green-400 { color: #4ade80 !important; }
        .text-red-400   { color: #f87171 !important; }
        .text-yellow-400 { color: var(--gold-lt) !important; }
        .text-blue-400   { color: #60a5fa !important; }
        .text-slate-500.font-mono { color: #4A4845 !important; }
    </style>
</head>

<body class="h-screen overflow-hidden flex flex-col" style="background:#050505;color:#E2E8F0">

    <!-- HELP TOOLTIP COMPONENT -->
    <script type="text/x-template" id="help-tooltip-template">
        <div class="relative inline-block ml-1 group">
            <span class="cursor-help text-slate-400 hover:text-brand-600 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
            </span>
            <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 hidden group-hover:block w-48 bg-slate-800 text-white text-[10px] p-2 rounded shadow-lg z-50 pointer-events-none text-center">
                {{ text }}
                <div class="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-slate-800"></div>
            </div>
        </div>
    </script>

    <div id="app" v-cloak class="flex-1 flex flex-col h-full overflow-hidden relative">

        <!-- AUTH OVERLAY -->
        <div v-if="!auth.token" class="fixed inset-0 z-[100] bg-brand-900 flex items-center justify-center p-4">
            <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">
                <div class="bg-brand-600 p-8 text-center text-white">
                    <div
                        class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-4 backdrop-blur-sm">
                        <span class="text-3xl font-bold">G</span>
                    </div>
                    <h2 class="text-2xl font-bold">Gordon Finance</h2>
                    <p class="text-white/70 text-sm mt-1">Actuarial spending insights.</p>
                </div>
                <div class="p-8">
                    <div v-if="authView === 'login'" class="space-y-4">
                        <h3 class="text-lg font-bold text-slate-800">Sign In</h3>
                        <input v-model="loginForm.username" type="text" placeholder="Username"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none">
                        <input v-model="loginForm.password" type="password" placeholder="Password" @keyup.enter="login"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none">
                        <button @click="login" :disabled="loading"
                            class="w-full bg-brand-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-brand-700">
                            {{ loading ? '...' : 'Sign In' }}
                        </button>
                        <div class="flex justify-center gap-4 pt-2">
                            <a href="/pricing.html" class="text-[10px] font-bold text-brand-600 hover:text-brand-700 uppercase tracking-widest">Pricing</a>
                            <a href="/side-hustle.html" class="text-[10px] font-bold text-brand-600 hover:text-brand-700 uppercase tracking-widest">Side Hustle</a>
                        </div>
                        <p class="text-center text-xs text-slate-500 mt-4 cursor-pointer hover:underline"
                            @click="authView = 'register'">Create an account</p>
                    </div>
                    <div v-else class="space-y-4">
                        <h3 class="text-lg font-bold text-slate-800">Register</h3>
                        <input v-model="registerForm.username" type="text" placeholder="Choose Username"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none">
                        <input v-model="registerForm.password" type="password" placeholder="Choose Password"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none">
                        <button @click="register" :disabled="loading"
                            class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-slate-900">
                            {{ loading ? '...' : 'Register' }}
                        </button>
                        <p class="text-center text-xs text-slate-500 mt-4 cursor-pointer hover:underline"
                            @click="authView = 'login'">Back to Login</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- MAIN APP -->
        <template v-if="auth.token">
            <header
                class="bg-white border-b border-slate-200 h-16 shrink-0 flex items-center justify-between px-4 lg:px-8 z-20 shadow-sm relative">
                <div class="flex items-center gap-3">
                    <div
                        class="w-10 h-10 bg-brand-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                        <span class="text-xl font-bold">G</span>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-slate-900 leading-tight">Gordon</h1>
                        <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-wider">{{ auth.username }}
                            <span v-if="auth.role === 'Admin'"
                                class="bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded-full ml-1">ADMIN</span>
                        </p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="hidden sm:flex items-center gap-1.5 bg-green-50 px-2.5 py-1 rounded-full border border-green-100 shadow-sm"
                        title="Security Hardened (v2.5.7+)">
                        <svg class="w-3 h-3 text-green-600" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd"
                                d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zM10 5.234A9.969 9.969 0 0115.833 7.7a9.97 9.97 0 011.001 6.3 9.97 9.97 0 01-6.834 5.766A9.97 9.97 0 013.166 14a9.97 9.97 0 011.001-6.3A9.969 9.969 0 0110 5.234zM10 11.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"
                                clip-rule="evenodd" />
                        </svg>
                        <span class="text-[10px] font-bold text-green-700 uppercase tracking-tight">Secure Mode</span>
                    </div>
                    <div class="hidden sm:flex items-center gap-4 border-l border-slate-200 pl-4 ml-2">
                        <a href="/pricing.html" class="text-xs font-bold text-brand-600 hover:text-brand-700 uppercase tracking-widest">Pricing</a>
                        <a href="/side-hustle.html" class="text-xs font-bold text-brand-600 hover:text-brand-700 uppercase tracking-widest">Side Hustle</a>
                    </div>
                    <button @click="logout"
                        class="text-xs font-bold text-slate-400 hover:text-red-500 transition-colors">LOGOUT</button>
                    <div class="md:hidden w-8 h-8 flex flex-col justify-center gap-1.5 cursor-pointer" @click="isMobileMenuOpen = !isMobileMenuOpen">
                        <span class="block h-0.5 w-5 rounded" style="background:var(--gold)"></span>
                        <span class="block h-0.5 w-5 rounded" style="background:var(--gold)"></span>
                        <span class="block h-0.5 w-3 rounded" style="background:var(--gold)"></span>
                    </div>
                </div>
            </header>

            <div class="flex-1 flex overflow-hidden max-w-7xl mx-auto w-full">
                <!-- SIDEBAR -->
                <aside class="hidden md:flex w-64 flex-col border-r border-slate-200 bg-white">
                    <nav class="flex-1 p-4 space-y-1">
                        <button v-for="item in menuItems" :key="item.id" @click="activeTab = item.id"
                            v-show="!item.adminOnly || auth.role === 'Admin'"
                            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all"
                            :class="activeTab === item.id ? 'bg-brand-50 text-brand-700 active-nav-glow' : 'text-slate-600 hover:bg-slate-50'">
                            <span class="w-7 h-7 rounded-md flex items-center justify-center text-[10px] font-black shrink-0 transition-colors"
                                :class="activeTab === item.id ? 'bg-brand-600 text-black shadow-[0_0_12px_rgba(212,169,49,0.4)]' : 'bg-[#1a1a1a] text-[#D4A931]'">{{ item.icon }}</span> {{ item.name }}
                        </button>
                        <button @click="activeTab = 's-rawdata'"
                            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all"
                            :class="activeTab === 's-rawdata' ? 'bg-brand-50 text-brand-700 active-nav-glow' : 'text-slate-600 hover:bg-slate-50'">
                            <span class="w-7 h-7 rounded-md flex items-center justify-center text-[10px] font-black shrink-0 transition-colors"
                                :class="activeTab === 's-rawdata' ? 'bg-brand-600 text-black shadow-[0_0_12px_rgba(212,169,49,0.4)]' : 'bg-[#1a1a1a] text-[#D4A931]'">raw</span> Raw Data
                        </button>
                    </nav>
                    <div class="p-4 border-t border-slate-100 bg-slate-50/50">
                        <button @click="sendReportNow" :disabled="sendingReport"
                            class="w-full flex items-center justify-center gap-2 py-2.5 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-700 hover:border-brand-300 hover:text-brand-600 shadow-sm transition-all active:scale-95">
                            {{ sendingReport ? 'Processing...' : 'Run Report' }}
                        </button>
                    </div>
                </aside>

                <!-- CONTENT -->
                <main class="flex-1 overflow-y-auto p-4 lg:p-8 pb-24 md:pb-8 bg-slate-50">

                    <!-- DASHBOARD -->
                    <div v-if="activeTab === 'dashboard'" class="space-y-6">
                        <div class="flex justify-between items-center">
                            <h2 class="text-2xl font-bold">Dashboard</h2>
                            <div class="flex gap-2">
                                <button @click="categorizeExisting" :disabled="categorizing"
                                    class="text-xs bg-white border border-slate-200 px-3 py-1.5 rounded-lg font-bold hover:bg-slate-50 disabled:opacity-50">
                                    {{ categorizing ? 'Processing...' : 'Categorize' }}
                                </button>
                                <button @click="forceRepull"
                                    class="text-xs bg-white border border-slate-200 px-3 py-1.5 rounded-lg font-bold hover:bg-slate-50">Sync</button>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-6 gap-4">
                            <!-- Current Balance -->
                            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm relative group lg:col-span-1 card-hover">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Current Balance</p>
                                <div class="mt-1 flex items-center">
                                    <span class="text-base font-bold tracking-tight whitespace-nowrap"
                                        :class="parseFloat(healthStats?.CurrentBalance) < 0 ? 'text-red-500' : 'text-slate-900'"
                                        :title="formatCurrency(parseFloat(healthStats?.CurrentBalance || 0))">
                                        {{ formatCurrency(parseFloat(healthStats?.CurrentBalance || 0)) }}
                                    </span>
                                </div>
                                <p class="text-[10px] text-slate-400 mt-1">Live from Investec</p>
                            </div>

                            <!-- Investec -->
                            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm card-hover">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Investec API
                                </p>
                                <div class="mt-1 flex items-center justify-between">
                                    <span class="text-lg font-bold"
                                        :class="systemStatus.investecOnline ? 'text-green-600' : 'text-red-600'">
                                        {{ systemStatus.investecOnline ? 'Online' : 'Offline' }}
                                    </span>
                                    <div class="w-8 h-8 rounded-lg flex items-center justify-center text-[10px] font-black"
                                        :class="systemStatus.investecOnline ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'">
                                        IN</div>
                                </div>
                                <p class="text-[10px] text-slate-400 mt-1">Last seen: {{
                                    formatTime(systemStatus.lastInvestecCheck) }}</p>
                            </div>

                            <!-- Database -->
                            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm card-hover">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Database</p>

        const BASE_THEME_VARIABLES = {

            '--card-border': '#181818', '--card-border-alt': '#242427',
            '--s5': '#212121', '--s6': '#2A2A2A', '--b3': '#2C2C2C',
            '--accent': '#D4A931', '--accent-lt': '#E8C55A', '--accent-dk': '#A87E20',
            '--accent-glow': 'rgba(212,169,49,0.10)', '--accent-shadow': 'rgba(212,169,49,0.4)',
            '--text-main': '#FFFFFF', '--text-body': '#E2E8F0',
            '--text-dim': '#CBD5E1', '--text-muted': '#94A3B8', '--text-faint': '#64748B'
        };

        // Colour math helpers used by the URL importer
        function _hexExpand(h) { return h.length === 4 ? '#'+h[1]+h[1]+h[2]+h[2]+h[3]+h[3] : h; }
        function _hexToRgb(h) { h = _hexExpand(h); return { r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) }; }
        function _lum(h) { const {r,g,b} = _hexToRgb(h); return 0.2126*r + 0.7152*g + 0.0722*b; }
        function _darken(h, a) { const {r,g,b} = _hexToRgb(h); return '#'+[r,g,b].map(c=>Math.max(0,Math.round(c*(1-a))).toString(16).padStart(2,'0')).join(''); }
        function _lighten(h, a) { const {r,g,b} = _hexToRgb(h); return '#'+[r,g,b].map(c=>Math.min(255,Math.round(c+(255-c)*a)).toString(16).padStart(2,'0')).join(''); }
        function _rgba(h, a) { const {r,g,b} = _hexToRgb(h); return `rgba(${r},${g},${b},${a})`; }

        // Derive a full 19-variable theme from just an accent + dark base colour
        function buildThemeFromColors(accent, bg) {
            return {
                '--app-bg': _darken(bg,0.4), '--app-surface': _darken(bg,0.2),
                '--card-bg': bg, '--card-bg-alt': _lighten(bg,0.06),
                '--card-border': _lighten(bg,0.10), '--card-border-alt': _lighten(bg,0.16),
                '--s5': _lighten(bg,0.13), '--s6': _lighten(bg,0.18), '--b3': _lighten(bg,0.20),
                '--accent': accent, '--accent-lt': _lighten(accent,0.18), '--accent-dk': _darken(accent,0.22),
                '--accent-glow': _rgba(accent,0.10), '--accent-shadow': _rgba(accent,0.40),
                '--text-main': '#FFFFFF', '--text-body': '#E2E8F0',
                '--text-dim': '#CBD5E1', '--text-muted': '#94A3B8', '--text-faint': '#64748B'
            };
        }

                async api(path, method = 'GET', body = null) {
                    // Access tokens are short-lived (15 min). On a 401 we attempt one silent
                    // refresh via the httpOnly refresh cookie, then retry the original request
                    // exactly once. Concurrent 401s collapse onto a single shared refresh
                    // promise so a burst of requests doesn't trigger N rotations.
                    const doFetch = () => {
                        const headers = { 'Authorization': `Bearer ${this.auth.token}` };
                        if (body) headers['Content-Type'] = 'application/json';
                        return fetch(path, {
                            method,
                            headers,
                            body: body ? JSON.stringify(body) : null,
                            credentials: 'include'
                        });
                    };

                    let res = await doFetch();
                    if (res.status === 401 && this.auth.token && !path.startsWith('/api/auth/')) {
                        const refreshed = await this.tryRefreshToken();
                        if (refreshed) {
                            res = await doFetch();
                        } else {
                            this.logout();
                        }
                    }
                    return res;
                },
                async tryRefreshToken() {
                    // Coalesce: if a refresh is already in flight, await the same promise so we
                    // never rotate the refresh token twice in parallel (which would invalidate
                    // one of the rotations).
                    if (this._refreshPromise) return this._refreshPromise;
                    this._refreshPromise = (async () => {
                        try {
                            const res = await fetch('/api/auth/refresh', {
                                method: 'POST',
                                credentials: 'include'
                            });
                            if (!res.ok) return false;
                            const data = await res.json();
                            this.auth.token = data.token;
                            localStorage.setItem('token', data.token);
                            return true;
                        } catch { return false; }
                        finally { this._refreshPromise = null; }
                    })();
                    return this._refreshPromise;
                },
                async login() {
                    this.loading = true;
                    try {
                        const res = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.loginForm),
                            credentials: 'include'
                        });
                        if (res.ok) {
                            const data = await res.json();
                            const payload = JSON.parse(atob(data.token.split('.')[1]));
                            const role = payload.role || 'User';

                            this.auth = { token: data.token, username: data.username, role: role };
                            localStorage.setItem('token', data.token);
                            localStorage.setItem('username', data.username);
                            localStorage.setItem('role', role);

                            this.loadData();
                            if (role === 'Admin') this.loadUsers();
                        } else this.showToast("Login Failed");
                    } catch { this.showToast("Network Error"); }
                    finally { this.loading = false; }
                },
                async register() {
                    this.loading = true;
                    try {
                        const res = await fetch('/api/auth/register', {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.registerForm)
                        });
                        if (res.ok) { this.showToast("Registered! Please login."); this.authView = 'login'; }
                        else this.showToast("Registration Failed");
                    } finally { this.loading = false; }
                },
                async logout() {
                    // Best-effort revoke server-side; clear local state regardless so a network
                    // failure can't trap the user logged in.
                    try {
                        await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
                    } catch { /* ignore */ }
                    this.auth = { token: null, username: null, role: null };
                    localStorage.clear();
                },
                async loadData() {
                    // Fire the four independent cold-load requests in parallel instead of
                    // staircasing them. On a fresh login this cuts dashboard time-to-render
                    // from ~4× round-trip to ~1× round-trip.
                    const [resS, resSt, resStats, resTx] = await Promise.all([
                        this.api('/api/settings'),
                        this.api('/api/settings/status'),
                        this.api('/api/settings/stats'),
                        this.api('/api/settings/recent-transactions'),
                    ]);

                    if (resS.ok) {
                        this.settings = await resS.json();
                        // Pre-fill thinking prompt textarea with default if user has nothing saved
                        if (!this.settings.thinkingModelInstructions) {
                            const defRes = await this.api('/api/settings/thinking-prompt-default');
                            if (defRes.ok) this.settings.thinkingModelInstructions = await defRes.text();
                        }
                        // Fire-and-forget — model lists never need to block the dashboard render.
                        // Swallow rejections so they don't surface as unhandled promise errors.
                        this.loadModels(false).catch(() => {});
                        this.loadModels(true).catch(() => {});
                        this.loadModels(false, true).catch(() => {});
                        this.$nextTick(() => {
                            document.title = `Gordon | ${this.settings.userName || this.auth.username}`;
                        });
                    }
                    if (resSt.ok) this.systemStatus = await resSt.json();
                    if (resStats.ok) this.healthStats = await resStats.json();
                    if (resTx.ok) this.recentTransactions = await resTx.json();

                    if (this.activeTab === 'dashboard') {
                        this.loadCharts();
                    }
                },
                async loadRawData() {
                    try {
                        const res = await this.api('/api/transactions?limit=100');
                        if (res.ok) {
                            this.rawTransactions = await res.json();
                        } else {
                            console.error("Failed to load raw transactions", res.statusText);
                            this.rawTransactions = [];
                        }
                    } catch (e) {
                        console.error("Failed to load raw transactions", e);
                        this.rawTransactions = [];
                    }
                },
                async loadUsers() {
                    const res = await this.api('/api/users');
                    if (res.ok) this.users = await res.json();
                },
                async loadModels(useFallback = false, useThinking = false) {
                    const res = await this.api(`/api/settings/models?useFallback=${useFallback}&useThinking=${useThinking}`, 'POST', this.settings);
                    if (res.ok) {
                        if (useThinking) this.availableThinkingModels = await res.json();
                        else if (useFallback) this.availableFallbackModels = await res.json();
                        else this.availableModels = await res.json();
                    }
                }, openUserModal(u = null) {
                    this.userForm = u ? { ...u, password: '' } : { id: 0, username: '', password: '', role: 'User' };
                    this.isUserModalOpen = true;
                },
                async saveUser() {
                    const method = this.userForm.id ? 'PUT' : 'POST';
                    const url = this.userForm.id ? `/api/users/${this.userForm.id}` : '/api/users';
                    const res = await this.api(url, method, this.userForm);
                    if (res.ok) { this.showToast("User Saved"); this.isUserModalOpen = false; this.loadUsers(); }
                    else this.showToast("Save Failed");
                },
                async loginClaudeCli() {
                    this.showToast("Initializing Claude CLI Login...");
                    try {
                        const res = await this.api('/api/settings/claude/login', 'POST');
                        if (res.ok) {
                            const data = await res.json();
                            // Show the link in a popup/alert so user can click/copy it
                            alert("Claude CLI Auth:\\n\\n" + data.output + "\\n\\nComplete the login in your browser, then close this popup.");
                            // Refresh status
                            const resSt = await this.api('/api/settings/status');
                            if (resSt.ok) this.systemStatus = await resSt.json();
                        } else {
                            this.showToast("Failed to start Claude CLI login");
                        }
                    } catch (e) {
                        this.showToast("Error communicating with Claude CLI");
                    }
                },
                async deleteUser(id) {
                    if (!confirm("Are you sure?")) return;
                    const res = await this.api(`/api/users/${id}`, 'DELETE');
                    if (res.ok) { this.showToast("User Deleted"); this.loadUsers(); }
                },
                async saveSettings() {
                    const res = await this.api('/api/settings', 'PUT', this.settings);
                    if (res.ok) this.showToast("Settings Saved");
                },
                async testInvestec() {
                    await this.saveSettings();
                    const res = await this.api('/api/settings/test-investec', 'POST');
                    if (res.ok) { this.showToast("Investec Connected"); this.loadData(); } else this.showToast("Failed");
                },
                async testEmail() {
                    await this.saveSettings();
                    const res = await this.api('/api/settings/test-email', 'POST');
                    if (res.ok) this.showToast("Email Sent"); else this.showToast("Failed");
                },
                async testAi() {
                    const res = await this.api('/api/settings/test-ai', 'POST', this.settings);
                    if (res.ok) this.showToast("Primary AI Online"); else this.showToast("Test Failed");
                },
                async categorizeHistory() {
                    if (this.categorizing) return;
                    this.categorizing = true;
                    this.categorizeResult = "";
                    try {
                        const res = await this.api('/api/transactions/categorize-all', 'POST');
                        const data = await res.json();
                        if (!res.ok) throw new Error(data.error || "Categorization failed");
                        this.categorizeResult = data.message;
                        this.showToast("History Categorized");
                        this.loadData();
                        this.loadCharts();
                    } catch (err) {
                        this.showToast(err.message);
                    } finally {
                        this.categorizing = false;
                    }
                },
                async ignoreFixedCost(name) {
                    if (!this.settings.ignoredFixedCosts) this.settings.ignoredFixedCosts = [];
                    if (!this.settings.ignoredFixedCosts.includes(name)) {
                        this.settings.ignoredFixedCosts.push(name);
                        await this.saveSettings();
                        this.loadData(); // Reload to refresh health stats and upcoming list
                    }
                },
                async unignoreFixedCost(name) {
                    if (!this.settings.ignoredFixedCosts) return;
                    const idx = this.settings.ignoredFixedCosts.indexOf(name);
                    if (idx > -1) {
                        this.settings.ignoredFixedCosts.splice(idx, 1);
                        await this.saveSettings();
                        this.loadData();
                    }
                },
                async loadCharts() {
                    try {
                        const resCat = await this.api('/api/chartdata/spending-by-category?days=30');
                        if (resCat.ok) {
                            const data = await resCat.json();
                            this.renderCategoryChart(data);
                        }

                        const resBal = await this.api('/api/chartdata/daily-balance?days=30');
                        if (resBal.ok) {
                            const data = await resBal.json();
                            this.renderBalanceChart(data);
                        }
                    } catch (err) {
                        console.error("Failed to load charts", err);
                    }
                },
                renderCategoryChart(data) {
                    const ctx = document.getElementById('categoryChart')?.getContext('2d');
                    if (!ctx) return;
                    if (this.categoryChart) this.categoryChart.destroy();
                    this.categoryChart = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: data.map(d => d.label),
                            datasets: [{
                                data: data.map(d => d.value),
                                backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#84cc16']
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 10, font: { size: 10 } } } } }
                    });
                },
                renderBalanceChart(data) {
                    const ctx = document.getElementById('balanceChart')?.getContext('2d');
                    if (!ctx) return;
                    if (this.balanceChart) this.balanceChart.destroy();
                    this.balanceChart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: data.map(d => new Date(d.date).toLocaleDateString()),
                            datasets: [{
                                label: 'Balance',
                                data: data.map(d => d.balance),
                                borderColor: '#6366f1',
                                fill: true,
                                backgroundColor: 'rgba(99, 102, 241, 0.1)',
                                tension: 0.4,
                                pointRadius: 0
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: { beginAtZero: false, ticks: { font: { size: 10 } } },
                                x: { ticks: { font: { size: 10 }, maxRotation: 45, minRotation: 45 } }
                            }
                        }
                    });
                },
                async saveSettings() {
                    const res = await this.api('/api/settings', 'PUT', this.settings);
                    if (res.ok) this.showToast("Settings Saved");
                },
                async testFallbackAi() {
                    await this.saveSettings();
                    const res = await this.api('/api/settings/test-fallback-ai', 'POST');
                    if (res.ok) { this.showToast("Fallback AI Connected"); this.loadData(); } else this.showToast("Fallback Failed");
                },
                async testThinkingAi() {
                    await this.saveSettings();
                    const res = await this.api('/api/settings/test-thinking-ai', 'POST');
                    if (res.ok) {
                        this.showToast("Thinking AI Connected");
                        this.loadData();
                    } else this.showToast("Thinking Failed");
                },
                async resetThinkingPrompt() {
                    const defRes = await this.api('/api/settings/thinking-prompt-default');
                    if (defRes.ok) {
                        this.settings.thinkingModelInstructions = await defRes.text();
                        this.showToast("Reset to default instructions");
                    } else {
                        this.settings.thinkingModelInstructions = '';
                        this.showToast("Could not load default — cleared instead");
                    }
                },
                async testTelegram() {
                    await this.saveSettings();
                    const res = await this.api('/api/settings/test-telegram', 'POST');
                    if (res.ok) this.showToast("Telegram Sent"); else this.showToast("Failed");
                },
                async testWhatsApp() {
                    await this.saveSettings();
                    const res = await this.api('/api/settings/test-whatsapp', 'POST');
                    if (res.ok) this.showToast("WhatsApp Sent"); else this.showToast("Failed");
                },
                async registerWebhook() {
                    let baseUrl = prompt("Enter your public HTTPS URL (e.g., https://yourdomain.com):", "https://financeai.wethegordons.co.za");
                    if (!baseUrl) return;
                    baseUrl = baseUrl.replace(/\/$/, "").replace(/\/telegram\/webhook$/, "");
                    const fullUrl = baseUrl + '/telegram/webhook';
                    try {
                        const res = await this.api('/telegram/setup-webhook', 'POST', { Url: fullUrl });
                        if (res.ok) this.showToast("Webhook Registered!");
                        else this.showToast("Failed");
                    } catch { this.showToast("Network Error"); }
                },
                async forceRepull() {
                    if (!confirm("Resync all transactions?")) return;
                    const res = await this.api('/api/settings/force-repull', 'POST');
                    if (res.ok) this.showToast("Sync Started");
                },
                async categorizeExisting() {
                    this.categorizing = true;
                    try {
                        const res = await this.api('/api/settings/categorize-existing', 'POST');
                        if (res.ok) {
                            const msg = await res.text();
                            this.showToast(msg);
                            this.loadData();
                        } else this.showToast("Failed to categorize");
                    } finally {
                        this.categorizing = false;
                    }
                },
                async sendReportNow() {
                    this.sendingReport = true;
                    try {
                        const res = await this.api('/api/settings/send-report-now', 'POST');
                        if (res.ok) this.showToast("Report Sent"); else this.showToast("Failed");
                    } finally { this.sendingReport = false; }
                },
                addAdjustment() {
                    if (!this.newAdjustment.amount || this.newAdjustment.amount <= 0) {
                        this.showToast("Please enter a valid amount");
                        return;
                    }
                    if (!this.newAdjustment.description.trim()) {
                        this.showToast("Please enter a description");
                        return;
                    }
                    this.simulationAdjustments.push({ ...this.newAdjustment });
                    this.newAdjustment.amount = 0;
                    this.newAdjustment.description = '';
                },
                removeAdjustment(idx) {
                    this.simulationAdjustments.splice(idx, 1);
                },
                async runSimulation() {
                    this.simLoading = true;
                    try {
                        const res = await this.api('/api/simulation', 'POST', {
                            adjustments: this.simulationAdjustments
                        });
                        if (res.ok) {
                            this.simulationResult = await res.json();
                            this.showToast("Simulation Complete");
                        } else {
                            this.showToast("Simulation Failed");
                        }
                    } catch (err) {
                        this.showToast("Network Error");
                    } finally {
                        this.simLoading = false;
                    }
                },
                async fetchLogs() {
                    const res = await this.api('/api/logs');
                    if (res.ok) this.logs = await res.json();
                },
                async loadLogFiles() {
                    const res = await this.api('/api/logs/files');
                    if (res.ok) this.logFileDates = await res.json();
                },
                async loadLogFileContent() {
                    if (!this.logFileDate) return;
                    this.logFileLoading = true;
                    this.logFileContent = '';
                    try {
                        const res = await this.api(`/api/logs/files/${this.logFileLevel}/${this.logFileDate}/tail?lines=200`);
                        if (res.ok) this.logFileContent = await res.text();
                        else this.showToast('Log file not found');
                    } finally {
                        this.logFileLoading = false;
                    }
                },
                startLogPolling() {
                    this.stopLogPolling();
                    this.logPolling = setInterval(() => this.fetchLogs(), 3000);
                },
                stopLogPolling() {
                    if (this.logPolling) {
                        clearInterval(this.logPolling);
                        this.logPolling = null;
                    }
                },
                getLogLevelClass(level) {
                    level = level.toUpperCase();
                    if (level === 'ERROR' || level === 'CRITICAL') return 'text-red-600 bg-red-50';
                    if (level === 'WARNING') return 'text-amber-600 bg-amber-50';
                    if (level === 'INFORMATION') return 'text-blue-600 bg-blue-50';
                    return 'text-slate-500 bg-slate-50';
                },
                showToast(msg) {
                    this.toast = { show: true, msg };
                    setTimeout(() => this.toast.show = false, 3000);
                },
                formatTime(d) { return d ? new Date(d).toLocaleTimeString() : 'Never'; },
                formatDate(d) { return d ? new Date(d).toLocaleDateString(undefined, { day: 'numeric', month: 'short' }) : ''; },
                formatCurrency(v) { return new Intl.NumberFormat(this.settings.currencyCulture || 'en-ZA', { style: 'currency', currency: 'ZAR' }).format(v); },
                applyTheme(theme) {
                    if (!theme || !theme.variables) return;
                    const root = document.documentElement;
                    // Clear every known variable first — prevents stale values from a
                    // previous theme bleeding through when the new theme omits some vars.
                    Object.keys(BASE_THEME_VARIABLES).forEach(k => root.style.removeProperty(k));
                    Object.entries(theme.variables).forEach(([key, val]) => root.style.setProperty(key, val));
                    this.selectedThemeId = theme.id;
                    localStorage.setItem('selectedThemeId', theme.id);
                },
                async addThemeFromUrl() {
                    if (!this.themeUrl) return;
                    this.importLoading = true;
                    try {
                        let fetchUrl = this.themeUrl.trim();
                        let themeName = 'Imported Theme';

                        if (fetchUrl.includes('getdesign.md')) {
                            // Input:  https://getdesign.md/lamborghini/design-md
                            // Output: https://getdesign.md/design-md/lamborghini/DESIGN.md
                            const parts = new URL(fetchUrl).pathname.split('/').filter(Boolean);
                            const brand = parts[0] || 'brand';
                            themeName = brand.charAt(0).toUpperCase() + brand.slice(1);
                            fetchUrl = `https://getdesign.md/design-md/${brand}/DESIGN.md`;
                        }

                        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(fetchUrl)}`;
                        const res = await fetch(proxyUrl);
                        if (!res.ok) throw new Error(`Proxy returned ${res.status}`);
                        const data = await res.json();
                        const text = data.contents || '';
                        if (!text || text.length < 100) throw new Error('Theme content not found or too short');

                        // Extract unique 6-digit hex codes (3-digit too noisy)
                        const hexes = [...new Set([...text.matchAll(/#([0-9A-Fa-f]{6})\b/g)].map(m => m[0]))];
                        if (hexes.length < 2) throw new Error(`Only ${hexes.length} colour(s) found — not enough`);

                        // Prefer a labelled primary/brand/accent colour; fall back to luminance sort
                        let accent = null;
                        const labelMatch = text.match(/(?:primary|brand|accent|highlight)[^\n#]*?(#[0-9A-Fa-f]{6})/i);
                        if (labelMatch) accent = labelMatch[1];

                        const sorted = [...hexes].sort((a, b) => _lum(a) - _lum(b));
                        const bg = sorted[0];
                        if (!accent) accent = hexes.find(h => { const l = _lum(h); return l > 25 && l < 210; }) || sorted[Math.floor(sorted.length * 0.7)];

                        this.themes.push({ id: 'theme-' + Date.now(), name: themeName, url: this.themeUrl, variables: buildThemeFromColors(accent, bg) });
                        this.saveThemes();
                        this.applyTheme(this.themes[this.themes.length - 1]);
                        this.themeUrl = '';
                        this.showToast(`Theme "${themeName}" imported!`);
                    } catch (e) {
                        console.error('Theme Import Error:', e);
                        this.showToast('Import failed: ' + e.message);
                    } finally {
                        this.importLoading = false;
                    }
                },
                saveThemes() {
                    localStorage.setItem('saved_themes', JSON.stringify(this.themes));
                },
                loadThemes() {
                    const lamborghiniDark = {
                        id: 'lamborghini-dark', name: 'Lamborghini Dark', url: '',
                        variables: {
                            ...BASE_THEME_VARIABLES
                            // BASE_THEME_VARIABLES is already the Lamborghini palette
                        }
                    };
                    const stripeDark = {
                        id: 'stripe-dark', name: 'Stripe Dark', url: 'https://getdesign.md/stripe/design-md',
                        variables: {
                            ...BASE_THEME_VARIABLES,
                            '--app-bg': '#030D1A', '--app-surface': '#061526', '--card-bg': '#091E35',
                            '--card-bg-alt': '#0C2540', '--card-border': '#0F2D4A', '--card-border-alt': '#133558',
                            '--s5': '#173D64', '--s6': '#1C4670', '--b3': '#184060',
                            '--text-body': '#ADBDCC', '--text-dim': '#8898AA', '--text-muted': '#6772E5', '--text-faint': '#424770',
                            '--accent': '#635BFF', '--accent-lt': '#7A73FF', '--accent-dk': '#43458B',
                            '--accent-glow': 'rgba(99,91,255,0.15)', '--accent-shadow': 'rgba(99,91,255,0.4)'
                        }
                    };
                    const forestDark = {
                        id: 'forest-dark', name: 'Forest Dark', url: '',
                        variables: {
                            ...BASE_THEME_VARIABLES,
                            '--app-bg': '#020A03', '--app-surface': '#060E07', '--card-bg': '#0A160B',
                            '--card-bg-alt': '#0E1D10', '--card-border': '#122514', '--card-border-alt': '#172E19',
                            '--s5': '#1C381E', '--s6': '#214224', '--b3': '#1E3820',
                            '--accent': '#22C55E', '--accent-lt': '#4ADE80', '--accent-dk': '#16A34A',
                            '--accent-glow': 'rgba(34,197,94,0.10)', '--accent-shadow': 'rgba(34,197,94,0.40)'
                        }
                    };

                    const saved = localStorage.getItem('saved_themes');
                    if (saved) {
                        this.themes = JSON.parse(saved);
                        // Ensure built-in defaults are always present and up-to-date
                        if (!this.themes.find(t => t.id === 'lamborghini-dark')) this.themes.unshift(lamborghiniDark);
                        if (!this.themes.find(t => t.id === 'stripe-dark')) this.themes.splice(1, 0, stripeDark);
                        if (!this.themes.find(t => t.id === 'forest-dark')) this.themes.splice(2, 0, forestDark);
                    } else {
                        this.themes = [lamborghiniDark, stripeDark, forestDark];
                    }

                    // CRITICAL: Always save themes on load to ensure definitions are available to Pricing/Side-Hustle pages
                    this.saveThemes();

                    const current = this.themes.find(t => t.id === this.selectedThemeId) || lamborghiniDark;
                    this.applyTheme(current);
                },
                resetThemes() {
                    if (!confirm("Reset built-in themes to default? Custom imported themes will be kept.")) return;
                    localStorage.removeItem('saved_themes');
                    this.loadThemes();
                    this.showToast("Defaults Restored");
                },
                deleteTheme(id) {
                    if (id === 'lamborghini-dark' || id === 'stripe-dark' || id === 'forest-dark') return;
                    this.themes = this.themes.filter(t => t.id !== id);
                    this.saveThemes();
                    if (this.selectedThemeId === id) this.applyTheme(this.themes[0]);
                },
                addThemeManual() {
                    try {
                        const manual = JSON.parse(this.manualThemeJson);
                        if (!manual.name || !manual.variables) throw new Error('Invalid format. Name and variables required.');
                        const newTheme = {
                            id: 'theme-manual-' + Date.now(),
                            name: manual.name,
                            url: 'Manual Import',
                            // Spread against the full base — omitted vars fall back to the
                            // dark default rather than inheriting stale theme values.
                            variables: { ...BASE_THEME_VARIABLES, ...manual.variables }
                        };
                        this.themes.push(newTheme);
                        this.saveThemes();
                        this.applyTheme(newTheme);
                        this.manualThemeJson = '';
                        this.showToast(`Theme "${manual.name}" applied!`);
                    } catch (e) {
                        this.showToast('Import error: ' + e.message);
                    }
                }
            }
        }).mount('#app');
    </script>
